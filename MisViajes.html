<style>
  :root {
    --bg: #f6f8fb;
    --bg-card: #ffffff;
    --text: #1a2332;
    --text-soft: #5c6b7f;
    --text-light: #94a3b8;
    --border: #e2e8f0;
    --primary: #2563eb;
    --primary-soft: #dbeafe;
    --danger: #dc2626;
    --danger-soft: #fee2e2;
    --success: #16a34a;

    /* Event type colors */
    --vuelo: #0ea5e9;
    --vuelo-soft: #e0f2fe;
    --hospedaje: #8b5cf6;
    --hospedaje-soft: #ede9fe;
    --actividad: #f59e0b;
    --actividad-soft: #fef3c7;
    --restaurante: #10b981;
    --restaurante-soft: #d1fae5;
    --nota: #64748b;
    --nota-soft: #f1f5f9;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 20px 50px rgba(0,0,0,0.15);
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 15px; }

  /* ===== Tabs Viajes / Actividades ===== */
  .tabs-bar {
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 4px;
    padding: 0 20px;
    position: sticky;
    top: 60px;
    z-index: 40;
  }
  .tab-btn {
    background: transparent;
    border: 0;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-soft);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); background: var(--bg); }
  .tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }

  /* ===== Layout ===== */
  .topbar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .topbar .folder-info {
    font-size: 13px;
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar .folder-info button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text-soft);
  }
  .topbar .folder-info button:hover { background: var(--bg); }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px;
  }

  /* ===== Buttons ===== */
  .btn {
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: #1d4fd0; }
  .btn-secondary {
    background: white;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg); border-color: #cbd5e1; }
  .btn-ghost {
    background: transparent;
    color: var(--text-soft);
    padding: 6px 10px;
  }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger {
    background: var(--danger-soft);
    color: var(--danger);
  }
  .btn-danger:hover { background: #fecaca; }

  /* ===== Welcome / Setup ===== */
  .welcome {
    max-width: 580px;
    margin: 80px auto;
    text-align: center;
    background: white;
    padding: 48px 36px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .welcome .icon { font-size: 56px; margin-bottom: 12px; }
  .welcome h2 { margin: 0 0 12px; font-size: 26px; }
  .welcome p { color: var(--text-soft); margin: 0 0 28px; }

  /* ===== Trips list ===== */
  .trips-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .trips-header h2 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
  }
  .trips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .trip-card {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .trip-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-2px);
    border-color: #cbd5e1;
  }
  .trip-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--vuelo), var(--hospedaje), var(--actividad));
  }
  .trip-card h3 {
    margin: 8px 0 8px;
    font-size: 18px;
  }
  .trip-card .dates {
    color: var(--text-soft);
    font-size: 13px;
    margin-bottom: 12px;
  }
  .trip-card .destinations {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .destination-pill {
    background: var(--primary-soft);
    color: var(--primary);
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .trip-card .footer {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-light);
    display: flex;
    justify-content: space-between;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  /* ===== Trip detail ===== */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    color: var(--text-soft);
    font-size: 14px;
  }
  .breadcrumb a {
    color: var(--primary);
    text-decoration: none;
    cursor: pointer;
  }
  .breadcrumb a:hover { text-decoration: underline; }

  .trip-header {
    background: white;
    border-radius: var(--radius);
    padding: 24px 28px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .trip-header h2 {
    margin: 0 0 8px;
    font-size: 30px;
  }
  .trip-header .meta {
    color: var(--text-soft);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .trip-header .actions {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .add-event-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .add-event-btn {
    background: white;
    border: 2px dashed var(--border);
    padding: 14px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-soft);
    flex: 1;
    min-width: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
  }
  .add-event-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-soft);
  }
  .add-event-btn .emoji { font-size: 20px; }

  /* ===== Timeline ===== */
  .timeline { position: relative; }
  .day-group {
    margin-bottom: 28px;
  }
  .day-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .day-header .day-num {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
  }
  .day-header .day-date {
    font-size: 14px;
    color: var(--text-soft);
    text-transform: capitalize;
  }
  .day-header .day-city {
    margin-left: auto;
    background: var(--bg);
    color: var(--text-soft);
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
  }

  .event-card {
    background: white;
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    border-left: 4px solid var(--text-light);
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: box-shadow 0.15s;
    cursor: pointer;
  }
  .event-card:hover { box-shadow: var(--shadow); }
  .event-card.vuelo { border-left-color: var(--vuelo); }
  .event-card.hospedaje { border-left-color: var(--hospedaje); }
  .event-card.actividad { border-left-color: var(--actividad); }
  .event-card.restaurante { border-left-color: var(--restaurante); }
  .event-card.nota { border-left-color: var(--nota); }

  .event-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .event-icon.vuelo { background: var(--vuelo-soft); }
  .event-icon.hospedaje { background: var(--hospedaje-soft); }
  .event-icon.actividad { background: var(--actividad-soft); }
  .event-icon.restaurante { background: var(--restaurante-soft); }
  .event-icon.nota { background: var(--nota-soft); }

  .event-body { flex: 1; min-width: 0; }
  .event-time {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 2px;
  }
  .event-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
    word-wrap: break-word;
  }
  .event-detail {
    font-size: 13px;
    color: var(--text-soft);
    margin-bottom: 2px;
    word-wrap: break-word;
  }
  .event-detail a {
    color: var(--primary);
    text-decoration: none;
  }
  .event-detail a:hover { text-decoration: underline; }
  .event-tags {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .event-tag {
    background: var(--bg);
    color: var(--text-soft);
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 12px;
  }
  .event-attachments {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .event-attach {
    background: var(--primary-soft);
    color: var(--primary);
    padding: 3px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .event-attach:hover { background: #c7d6f8; }
  .event-actions {
    display: flex;
    gap: 4px;
    align-items: flex-start;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .event-card:hover .event-actions { opacity: 1; }

  /* ===== Modal ===== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.5);
    backdrop-filter: blur(2px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    padding: 22px 26px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 { margin: 0; font-size: 20px; }
  .modal-close {
    background: none;
    border: none;
    font-size: 24px;
    color: var(--text-light);
    line-height: 1;
    padding: 0 6px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body {
    padding: 22px 26px;
  }
  .modal-footer {
    padding: 16px 26px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* ===== Forms ===== */
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .field input,
  .field select,
  .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: white;
    transition: border 0.15s;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-soft);
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .field-row-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .field-hint {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
  }
  .field-error {
    background: var(--danger-soft);
    color: var(--danger);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 12px;
  }

  /* ===== Attachments ===== */
  .attachments-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 10px;
  }
  .attachment-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 13px;
  }
  .attachment-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attachment-item .remove {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    font-size: 14px;
    animation: slide-in 0.2s ease-out;
  }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  @keyframes slide-in {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ===== Tab buttons in event modal ===== */
  .type-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }
  .type-btn {
    border: 2px solid var(--border);
    background: white;
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
    transition: all 0.15s;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
  }
  .type-btn .emoji { font-size: 24px; display: block; margin-bottom: 4px; }
  .type-btn:hover { border-color: var(--text-soft); }
  .type-btn.active.vuelo { border-color: var(--vuelo); background: var(--vuelo-soft); color: var(--vuelo); }
  .type-btn.active.hospedaje { border-color: var(--hospedaje); background: var(--hospedaje-soft); color: var(--hospedaje); }
  .type-btn.active.actividad { border-color: var(--actividad); background: var(--actividad-soft); color: var(--actividad); }
  .type-btn.active.restaurante { border-color: var(--restaurante); background: var(--restaurante-soft); color: var(--restaurante); }
  .type-btn.active.nota { border-color: var(--nota); background: var(--nota-soft); color: var(--nota); }

  /* ===== Paste box ===== */
  .paste-box {
    background: var(--primary-soft);
    border: 1px dashed var(--primary);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 18px;
    font-size: 13px;
  }
  .paste-box summary {
    cursor: pointer;
    font-weight: 600;
    color: var(--primary);
  }
  .paste-box textarea {
    width: 100%;
    margin-top: 10px;
    min-height: 100px;
    border: 1px solid #c7d2fe;
    border-radius: 8px;
    padding: 8px;
    font-family: -apple-system, monospace;
    font-size: 12px;
  }
  .paste-box .actions {
    margin-top: 8px;
    display: flex;
    gap: 8px;
  }

  /* ===== Hospedaje banners (en horizontal) ===== */
  .hospedajes-section {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .hospedaje-banner {
    background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
    border-left: 5px solid var(--hospedaje);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: var(--shadow-sm);
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
  }
  .hospedaje-banner:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .hospedaje-head {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hospedaje-icon {
    width: 40px;
    height: 40px;
    background: var(--hospedaje);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .hospedaje-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    min-width: 0;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .hospedaje-stay-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .hospedaje-stay-row .lbl {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
    font-weight: 700;
  }
  .hospedaje-stay-row .val {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .hospedaje-stay-row .arrow {
    color: var(--hospedaje);
    font-weight: 700;
    font-size: 18px;
  }
  .hospedaje-stay-row .nights {
    margin-left: auto;
    background: var(--hospedaje);
    color: white;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
  }
  .hospedaje-detail {
    font-size: 13px;
    color: var(--text-soft);
    word-wrap: break-word;
  }
  .hospedaje-detail a {

<script>
/* =====================================================
   ESTADO GLOBAL
   ===================================================== */
let currentUser = null;   // Firebase User (o null si no auth)
let currentTrip = null;   // Trip abierto {id, data}
let allTrips = [];        // Lista de trips (para la home)
let tripsUnsubscribe = null;
let currentTripUnsubscribe = null;
let currentTab = 'viajes';  // 'viajes' | 'actividades'
let allActivities = [];    // Lista de actividades
let activityFilters = { audience: 'con-ninos', province: 'all', search: '' };

/* =====================================================
   AUTENTICACIÓN FIREBASE
   ===================================================== */
async function fbSignIn(email, password) {
  const { auth, signInWithEmailAndPassword } = window.FB;
  return signInWithEmailAndPassword(auth, email, password);
}
async function fbSignUp(email, password) {
  const { auth, createUserWithEmailAndPassword } = window.FB;
  return createUserWithEmailAndPassword(auth, email, password);
}
async function fbSignOut() {
  const { auth, signOut } = window.FB;
  if (tripsUnsubscribe) { tripsUnsubscribe(); tripsUnsubscribe = null; }
  if (currentTripUnsubscribe) { currentTripUnsubscribe(); currentTripUnsubscribe = null; }
  currentTrip = null;
  allTrips = [];
  await signOut(auth);
}
async function fbResetPassword(email) {
  const { auth, sendPasswordResetEmail } = window.FB;
  return sendPasswordResetEmail(auth, email);
}

function updateFolderInfo() {
  const info = document.getElementById('user-email');
  const btn = document.getElementById('signout-btn');
  if (!info) return;
  if (currentUser) {
    info.textContent = '👤 ' + currentUser.email;
    if (btn) btn.style.display = '';
  } else {
    info.textContent = '';
    if (btn) btn.style.display = 'none';
  }
}

/* =====================================================
   ENTRADA / SALIDA DE VIAJES (Firestore)
   ===================================================== */
function tripsCollection() {
  const { db, collection } = window.FB;
  return collection(db, 'users', currentUser.uid, 'trips');
}
function tripDocRef(id) {
  const { db, doc } = window.FB;
  return doc(db, 'users', currentUser.uid, 'trips', id);
}

async function loadTrips() {
  const { getDocs } = window.FB;
  const snap = await getDocs(tripsCollection());
  allTrips = [];
  snap.forEach(d => allTrips.push({ id: d.id, data: d.data() }));
  allTrips.sort((a, b) => {
    const da = a.data.meta?.startDate || '';
    const db = b.data.meta?.startDate || '';
    return db.localeCompare(da);
  });
}

async function saveCurrentTrip() {
  if (!currentTrip || !currentUser) return;
  try {
    const { setDoc, serverTimestamp } = window.FB;
    const data = { ...currentTrip.data, _updated: serverTimestamp() };
    await setDoc(tripDocRef(currentTrip.id), data);
    return true;
  } catch (err) {
    console.error('saveCurrentTrip:', err);
    showToast('Error guardando: ' + err.message, 'error');
    throw err;
  }
}

function slugify(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .substring(0, 50);
}

async function createTrip(meta) {
  const { setDoc, serverTimestamp } = window.FB;
  const id = 'trip-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
  const data = {
    meta: { ...meta, id, createdAt: new Date().toISOString() },
    events: [],
    _created: serverTimestamp()
  };
  await setDoc(tripDocRef(id), data);
  return { id, data };
}

async function deleteTrip(tripEntry) {
  if (!confirm(`¿Eliminar el viaje "${tripEntry.data.meta.name}"? Se borrará junto con sus adjuntos.`)) return;
  const { deleteDoc, doc, db } = window.FB;
  try {
    // Borrar todos los adjuntos (documentos en /attachments)
    const events = tripEntry.data.events || [];
    for (const ev of events) {
      if (ev.attachments?.length) {
        for (const a of ev.attachments) {
          if (a.attId) {
            try { await deleteDoc(doc(db, 'users', currentUser.uid, 'attachments', a.attId)); } catch(_){}
          }
        }
      }
    }
    await deleteDoc(tripDocRef(tripEntry.id));
    await loadTrips();
    renderTripsList();
    showToast('Viaje eliminado');
  } catch (err) {
    console.error(err);
    showToast('Error eliminando: ' + err.message, 'error');
  }
}

/* =====================================================
   HELPERS DE FORMATO Y FECHAS
   ===================================================== */
const DIA_SEMANA = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function formatDate(isoDate) {
  if (!isoDate) return '';
  const d = new Date(isoDate + 'T12:00:00');
  return `${DIA_SEMANA[d.getDay()]}, ${d.getDate()} de ${MES[d.getMonth()]} ${d.getFullYear()}`;
}
function formatDateShort(isoDate) {
  if (!isoDate) return '';
  const d = new Date(isoDate + 'T12:00:00');
  return `${d.getDate()} ${MES[d.getMonth()].substring(0,3)} ${d.getFullYear()}`;
}
function formatDateRange(start, end) {
  if (!start) return '';
  if (!end || start === end) return formatDateShort(start);
  const ds = new Date(start + 'T12:00:00');
  const de = new Date(end + 'T12:00:00');
  if (ds.getFullYear() === de.getFullYear() && ds.getMonth() === de.getMonth()) {
    return `${ds.getDate()} – ${de.getDate()} ${MES[de.getMonth()]} ${de.getFullYear()}`;
  }
  return `${formatDateShort(start)} – ${formatDateShort(end)}`;
}
function formatTime(t) {
  if (!t) return '';
  return t.length > 5 ? t.substring(0,5) : t;
}
function parseDurationToMinutes(s) {
  if (!s) return null;
  const str = String(s).toLowerCase();
  // "2:30" (formato hh:mm)
  let m = str.match(/^(\d+):(\d{1,2})/);
  if (m) return parseInt(m[1]) * 60 + parseInt(m[2]);
  // "2h 30min" o "2 h 30 min"
  m = str.match(/(\d+)\s*h(?:oras?)?\s*(\d+)\s*m/i);
  if (m) return parseInt(m[1]) * 60 + parseInt(m[2]);
  // "2.5 h" o "2,5 horas"
  m = str.match(/(\d+(?:[.,]\d+)?)\s*(?:h|horas?)\b/i);
  if (m) return Math.round(parseFloat(m[1].replace(',', '.')) * 60);
  // "150 minutos" o "30 min"
  m = str.match(/(\d+)\s*min/i);
  if (m) return parseInt(m[1]);
  return null;
}
function computeEndTime(startTime, durationStr) {
  if (!startTime) return null;
  const minutes = parseDurationToMinutes(durationStr);
  if (!minutes) return null;
  const [hh, mm] = startTime.split(':').map(n => parseInt(n));
  const total = (hh * 60 + mm + minutes) % (24 * 60);
  return String(Math.floor(total / 60)).padStart(2, '0') + ':' + String(total % 60).padStart(2, '0');
}
const PROVINCIAS_ES = [
  'Álava','Albacete','Alicante','Almería','Asturias','Ávila','Badajoz','Barcelona','Burgos','Cáceres',
  'Cádiz','Cantabria','Castellón','Ciudad Real','Córdoba','A Coruña','Cuenca','Girona','Granada',
  'Guadalajara','Gipuzkoa','Huelva','Huesca','Islas Baleares','Jaén','León','Lleida','La Rioja','Lugo',
  'Madrid','Málaga','Murcia','Navarra','Ourense','Palencia','Las Palmas','Pontevedra','Salamanca',
  'Santa Cruz de Tenerife','Segovia','Sevilla','Soria','Tarragona','Teruel','Toledo','Valencia',
  'Valladolid','Bizkaia','Zamora','Zaragoza','Ceuta','Melilla'
];

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function mapsUrl(address) {
  if (!address) return '';
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address);
}
function daysBetween(start, end) {
  const ds = new Date(start + 'T12:00:00');
  const de = new Date(end + 'T12:00:00');
  return Math.round((de - ds) / (1000 * 60 * 60 * 24));
}
function addDays(start, n) {
  const d = new Date(start + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().substring(0, 10);
}

async function doAuth(mode) {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!email) { errEl.textContent = 'Pon tu email'; errEl.style.display = 'block'; return; }
  try {
    if (mode === 'signin') {
      if (!password) throw new Error('Pon tu contraseña');
      await fbSignIn(email, password);
    } else if (mode === 'signup') {
      if (!password || password.length < 6) throw new Error('La contraseña debe tener al menos 6 caracteres');
      await fbSignUp(email, password);
      showToast('Cuenta creada. Ya puedes usar la app.');
    } else if (mode === 'reset') {
      await fbResetPassword(email);
      showToast('Te hemos enviado un email para restablecer la contraseña.');
    }
  } catch (err) {
    let msg = err.message || 'Error de autenticación';
    if (msg.includes('invalid-credential')) msg = 'Email o contraseña incorrectos';
    else if (msg.includes('email-already-in-use')) msg = 'Ese email ya tiene cuenta. Prueba iniciar sesión.';
    else if (msg.includes('weak-password')) msg = 'La contraseña es muy débil (mínimo 6 caracteres)';
    else if (msg.includes('invalid-email')) msg = 'Email inválido';
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }
}

async function submitNewTrip() {
  const name = document.getElementById('trip-name').value.trim();
  const startDate = document.getElementById('trip-start').value;
  const endDate = document.getElementById('trip-end').value;
  const destinations = document.getElementById('trip-destinations').value.split(',').map(s => s.trim()).filter(Boolean);
  const notes = document.getElementById('trip-notes').value.trim();
  if (!name) { showToast('Pon un nombre al viaje', 'error'); return; }
  if (startDate && endDate && startDate > endDate) { showToast('La fecha fin no puede ser anterior al inicio', 'error'); return; }
  const newTrip = await createTrip({ name, startDate, endDate, destinations, notes });
  await loadTrips();
  closeModal();
  showToast('Viaje creado');
  const created = allTrips.find(t => t.id === newTrip.id);
  if (created) openTrip(created);
}

/* =====================================================
   RENDER: DETALLE DEL VIAJE (TIMELINE)
   ===================================================== */
function renderTripDetail() {
  const m = currentTrip.data.meta;
  const allEvents = [...(currentTrip.data.events || [])];
  allEvents.sort((a, b) => {
    const ka = (a.date || '') + (a.time || '00:00');
    const kb = (b.date || '') + (b.time || '00:00');
    return ka.localeCompare(kb);
  });

  // Separar hospedajes (van en banner aparte) del resto
  const hospedajes = allEvents.filter(e => e.type === 'hospedaje');
  const events = allEvents.filter(e => e.type !== 'hospedaje');

  // Construir días entre startDate y endDate
  const days = [];
  if (m.startDate && m.endDate) {
    const total = daysBetween(m.startDate, m.endDate) + 1;
    for (let i = 0; i < total; i++) {
      days.push(addDays(m.startDate, i));
    }
  }
  // Añadir días extra para eventos que caen fuera del rango
  events.forEach(e => {
    if (e.date && !days.includes(e.date)) days.push(e.date);
  });
  days.sort();

  // Agrupar eventos por día
  const grouped = {};
  events.forEach(e => {
    const k = e.date || 'sin-fecha';
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(e);
  });

  const html = `
    <div class="container">
      <div class="breadcrumb">
        <a onclick="navigateToList()">← Mis viajes</a>
      </div>
      <div class="trip-header">
        <h2>${escapeHtml(m.name)}</h2>
        <div class="meta">
          <span>📅 ${escapeHtml(formatDateRange(m.startDate, m.endDate))}</span>
          ${(m.destinations || []).map(d => `<span class="destination-pill">${escapeHtml(d)}</span>`).join('')}
        </div>
        ${m.notes ? `<div style="margin-top:12px;color:var(--text-soft);font-size:14px">📝 ${escapeHtml(m.notes)}</div>` : ''}
        <div class="actions">
          <button class="btn btn-secondary" onclick="openCreateTripModal(currentTrip)">✏️ Editar viaje</button>
          <button class="btn btn-secondary" onclick="openChecklistModal()">📋 Checklist</button>
          <button class="btn btn-secondary" onclick="exportExpensesPDF()">💰 Resumen gastos</button>
          <button class="btn btn-secondary" onclick="exportTrip()">📤 Exportar al móvil</button>
        </div>
      </div>

      ${hospedajes.length ? `<div class="hospedajes-section">${hospedajes.map(renderHospedajeBanner).join('')}</div>` : ''}

      <div class="add-bar">
        <div class="add-dropdown">
          <button class="btn btn-primary" onclick="toggleAddMenu(event)">+ Añadir <span style="font-size:11px">▾</span></button>
          <div class="add-menu" id="add-menu">
            <button onclick="openEventModal('vuelo'); closeAddMenu()"><span class="emoji">✈️</span> Vuelo / Transporte</button>
            <button onclick="openEventModal('hospedaje'); closeAddMenu()"><span class="emoji">🏨</span> Hospedaje</button>
            <button onclick="openEventModal('actividad'); closeAddMenu()"><span class="emoji">🎟️</span> Actividad</button>
            <button onclick="openEventModal('restaurante'); closeAddMenu()"><span class="emoji">🍽️</span> Restaurante / Nota</button>
            <button onclick="openAddFromSavedActivities(); closeAddMenu()" style="border-top:1px solid var(--border)"><span class="emoji">📌</span> Desde actividades guardadas</button>
          </div>
        </div>
      </div>

      <div class="calendar-section">
        ${days.length === 0 && events.length === 0 && hospedajes.length === 0
          ? `<div class="empty-state">
              <div class="icon">📍</div>
              <p>Aún no has añadido nada a este viaje. Empieza pulsando el botón "+ Añadir".</p>
            </div>`
          : renderCalendar(days, grouped, m)
        }
      </div>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
}

function renderHospedajeBanner(ev) {
  const inDate = ev.date ? formatDateShort(ev.date) : '—';
  const outDate = ev.checkout ? formatDateShort(ev.checkout) : '—';
  const nights = ev.date && ev.checkout ? daysBetween(ev.date, ev.checkout) : null;

  const attachLinks = (ev.attachments || []).map((a, i) =>
    `<span class="event-attach" onclick="event.stopPropagation(); openAttachmentFromEvent('${ev.id}', ${i})">${a.mime?.startsWith('image/') ? '🖼️' : '📎'} ${escapeHtml(a.name)}</span>`
  ).join('');

  return `
    <div class="hospedaje-banner" onclick="openEventModal('hospedaje', '${ev.id}')">
      <div class="hospedaje-head">
        <div class="hospedaje-icon">🏨</div>
        <div class="hospedaje-title">${escapeHtml(ev.title || 'Hospedaje')}</div>
        <button class="btn-ghost hospedaje-del" onclick="event.stopPropagation(); deleteEvent('${ev.id}')" title="Eliminar">🗑️</button>
      </div>
      <div class="hospedaje-stay-row">
        <div><span class="lbl">Desde</span><span class="val">${escapeHtml(inDate)}</span></div>
        <div class="arrow">→</div>
        <div><span class="lbl">Hasta</span><span class="val">${escapeHtml(outDate)}</span></div>
        ${nights ? `<div class="nights">${nights} noche${nights === 1 ? '' : 's'}</div>` : ''}
      </div>
      ${ev.address ? `<div class="hospedaje-detail">📍 <a href="${mapsUrl(ev.address)}" target="_blank" onclick="event.stopPropagation()">${escapeHtml(ev.address)}</a></div>` : ''}
      ${attachLinks ? `<div class="event-attachments" style="margin-top:8px">${attachLinks}</div>` : ''}
    </div>
  `;
}

function renderCalendar(days, grouped, meta) {
  const startDate = meta.startDate;
  const calendarDays = days.filter(d => d !== 'sin-fecha');
  const cols = Math.min(7, Math.max(1, calendarDays.length));

  // Sacar los hospedajes para inyectar check-in/check-out en sus días
  const hospedajes = (currentTrip.data.events || []).filter(e => e.type === 'hospedaje');

  let cells = '';
  for (const date of calendarDays) {
    const dayNum = startDate ? daysBetween(startDate, date) + 1 : null;
    const dayEvents = [...(grouped[date] || [])];

    // Inyectar pseudo-eventos de check-in y check-out con la ventana completa
    for (const h of hospedajes) {
      if (h.date === date) {
        dayEvents.push({
          _pseudo: true, _hospedajeId: h.id, _kind: 'checkin',
          type: 'hospedaje',
          title: 'Check-in ' + (h.title || 'Hospedaje'),
          time: h.time || '',
          timeEnd: h.checkInUntil || '',
          _sortTime: h.time || '15:00'
        });
      }
      if (h.checkout === date) {
        const coFrom = h.checkOutFrom || '';
        const coTo = h.checkoutTime || '';
        dayEvents.push({
          _pseudo: true, _hospedajeId: h.id, _kind: 'checkout',
          type: 'hospedaje',
          title: 'Check-out ' + (h.title || 'Hospedaje'),
          time: coFrom || coTo,
          timeEnd: (coFrom && coTo) ? coTo : '',
          _sortTime: coTo || coFrom || '11:00'
        });
      }
    }

    // Re-ordenar por hora (usando _sortTime cuando es pseudo-evento)
    dayEvents.sort((a, b) => (a._sortTime || a.time || '00:00').localeCompare(b._sortTime || b.time || '00:00'));

    const d = new Date(date + 'T12:00:00');
    const wday = DIA_SEMANA[d.getDay()].substring(0, 3);
    cells += `
      <div class="cal-day">
        <div class="cal-day-header">
          ${dayNum && dayNum >= 1 ? `<div class="cal-day-num">Día ${dayNum}</div>` : ''}
          <div class="cal-day-date">${escapeHtml(wday)} ${d.getDate()} ${MES[d.getMonth()].substring(0, 3)}</div>
        </div>
        <div class="cal-day-events">
          ${dayEvents.length === 0
            ? `<div class="cal-day-empty">Sin eventos</div>`
            : dayEvents.map(ev => renderMiniEventCard(ev)).join('')
          }
        </div>
      </div>
    `;
  }

  const sinFechaSection = grouped['sin-fecha']
    ? `<div class="pending-section">
         <div class="pending-h">⏳ Pendientes de programar <span class="pending-count">${grouped['sin-fecha'].length}</span></div>
         <div class="pending-hint">Estos eventos aún no tienen fecha. Ábrelos y pon fecha cuando lo tengas claro, y aparecerán en el calendario.</div>
         ${grouped['sin-fecha'].map(ev => renderEventCard(ev)).join('')}
       </div>`
    : '';

  return `
    <div class="calendar-grid" style="grid-template-columns: repeat(${cols}, minmax(0, 1fr))">
      ${cells}
    </div>
    ${sinFechaSection}
  `;
}

function renderMiniEventCard(ev) {
  const type = ev.type;
  const emoji = ev._kind === 'checkin' ? '🛬' : ev._kind === 'checkout' ? '🛫' : (TYPE_EMOJI[type] || '📍');
  let timeText = '';
  if (ev.time) {
    timeText = formatTime(ev.time);
    let end = ev.timeEnd;
    if (!end && ev.duration) end = computeEndTime(ev.time, ev.duration);
    if (end) timeText += ' → ' + formatTime(end);
    // Horario partido (segunda franja)
    if (ev.time2) {
      timeText += ' · ' + formatTime(ev.time2);
      if (ev.timeEnd2) timeText += ' → ' + formatTime(ev.timeEnd2);
    }
  } else if (ev._pseudo) {
    timeText = ev._kind === 'checkin' ? 'Desde' : 'Hasta';
  }
  const attachIndicator = !ev._pseudo && ev.attachments?.length ? ` <span style="font-size:11px;opacity:.7">📎${ev.attachments.length}</span>` : '';
  const clickId = ev._pseudo ? ev._hospedajeId : ev.id;
  const extraClass = ev._pseudo ? ' pseudo' : '';
  return `
    <div class="cal-event ${type}${extraClass}" onclick="openEventModal('${type}', '${clickId}')">
      <div class="cal-event-row">
        <span class="cal-event-icon">${emoji}</span>
        ${timeText ? `<span class="cal-event-time">${escapeHtml(timeText)}</span>` : ''}
      </div>
      <div class="cal-event-title">${escapeHtml(ev.title || TYPE_LABEL[type])}${attachIndicator}</div>
    </div>
  `;
}

const TYPE_EMOJI = { vuelo: '✈️', hospedaje: '🏨', actividad: '🎟️', restaurante: '🍽️', nota: '📝' };
const TYPE_LABEL = { vuelo: 'Vuelo', hospedaje: 'Hospedaje', actividad: 'Actividad', restaurante: 'Restaurante', nota: 'Nota' };

function renderEventCard(ev) {
  const type = ev.type;
  const emoji = TYPE_EMOJI[type] || '📍';
  let timeText = '';
  if (type === 'vuelo' && ev.time && ev.timeEnd) {
    timeText = `${formatTime(ev.time)} → ${formatTime(ev.timeEnd)}`;
  } else if (type === 'hospedaje') {
    timeText = ev.checkout ? `Check-in${ev.time ? ' ' + formatTime(ev.time) : ''} · Check-out ${formatDateShort(ev.checkout)}` : (ev.time ? `Check-in ${formatTime(ev.time)}` : 'Check-in');
  } else if (ev.time) {
    timeText = formatTime(ev.time);
    let end = ev.timeEnd;
    if (!end && ev.duration) end = computeEndTime(ev.time, ev.duration);
    if (end) timeText += ` → ${formatTime(end)}`;
    if (ev.time2) {
      timeText += ` · ${formatTime(ev.time2)}`;
      if (ev.timeEnd2) timeText += ` → ${formatTime(ev.timeEnd2)}`;
    }
  } else {
    timeText = 'Todo el día';
  }

  let detailLines = [];
  if (type === 'vuelo') {
    if (ev.airline || ev.flightNumber) detailLines.push(`${escapeHtml(ev.airline || '')} ${escapeHtml(ev.flightNumber || '')}`.trim());
    if (ev.from || ev.to) detailLines.push(`${escapeHtml(ev.from || '')} → ${escapeHtml(ev.to || '')}`);
    if (ev.terminal) detailLines.push(`Terminal ${escapeHtml(ev.terminal)}${ev.gate ? ', puerta ' + escapeHtml(ev.gate) : ''}`);
    if (ev.seat) detailLines.push(`Asiento ${escapeHtml(ev.seat)}`);
  } else if (type === 'hospedaje') {
    if (ev.address) detailLines.push(`📍 <a href="${mapsUrl(ev.address)}" target="_blank">${escapeHtml(ev.address)}</a>`);
    if (ev.phone) detailLines.push(`☎️ ${escapeHtml(ev.phone)}`);
  } else if (type === 'actividad' || type === 'restaurante' || type === 'nota') {
    if (ev.address) detailLines.push(`📍 <a href="${mapsUrl(ev.address)}" target="_blank">${escapeHtml(ev.address)}</a>`);
    if (ev.meetingPoint) detailLines.push(`🚩 Punto de encuentro: ${escapeHtml(ev.meetingPoint)}`);
    if (ev.web) detailLines.push(`🔗 <a href="${escapeHtml(ev.web)}" target="_blank" rel="noopener">${escapeHtml(ev.web)}</a>`);
  }

  let tags = [];
  if (ev.locator) tags.push(`Loc: ${escapeHtml(ev.locator)}`);
  if (ev.price) tags.push(`${escapeHtml(ev.price)} ${escapeHtml(ev.currency || '')}`.trim());
  if (ev.timezone) tags.push(`🌐 ${escapeHtml(ev.timezone)}`);

  const attachLinks = (ev.attachments || []).map((a, i) =>
    `<span class="event-attach" onclick="event.stopPropagation(); openAttachmentFromEvent('${ev.id}', ${i})">${a.mime?.startsWith('image/') ? '🖼️' : '📎'} ${escapeHtml(a.name)}</span>`
  ).join('');

  return `
    <div class="event-card ${type}" onclick="openEventModal('${type}', '${ev.id}')">
      <div class="event-icon ${type}">${emoji}</div>
      <div class="event-body">
        <div class="event-time">${escapeHtml(timeText)}</div>
        <div class="event-title">${escapeHtml(ev.title || TYPE_LABEL[type])}</div>
        ${detailLines.map(d => `<div class="event-detail">${d}</div>`).join('')}
        ${ev.notes ? `<div class="event-detail">📝 ${escapeHtml(ev.notes)}</div>` : ''}
        ${tags.length ? `<div class="event-tags">${tags.map(t => `<span class="event-tag">${t}</span>`).join('')}</div>` : ''}
        ${attachLinks ? `<div class="event-attachments">${attachLinks}</div>` : ''}
      </div>
      <div class="event-actions">
        <button class="btn-ghost" onclick="event.stopPropagation(); deleteEvent('${ev.id}')" title="Eliminar">🗑️</button>
      </div>
    </div>
  `;
}

function newEventTemplate(type) {
  const tpl = {
    id: 'ev-' + Date.now() + '-' + Math.random().toString(36).substring(2, 7),
    type: type,
    title: '',
    date: currentTrip?.data?.meta?.startDate || '',
    time: '',
    timezone: '',
    address: '',
    locator: '',
    price: '',
    currency: 'EUR',
    notes: '',
    attachments: []
  };
  if (type === 'vuelo') {
    tpl.airline = ''; tpl.flightNumber = '';
    tpl.from = ''; tpl.to = '';
    tpl.terminal = ''; tpl.gate = ''; tpl.seat = '';
    tpl.timeEnd = ''; tpl.dateEnd = '';
  } else if (type === 'hospedaje') {
    tpl.checkout = ''; tpl.checkoutTime = ''; tpl.checkInUntil = ''; tpl.checkOutFrom = ''; tpl.phone = '';
  } else if (type === 'actividad') {
    tpl.meetingPoint = ''; tpl.duration = '';
    tpl.timeEnd = '';
    tpl.time2 = ''; tpl.timeEnd2 = '';
    tpl.timeMode = 'fijo';
    tpl.web = '';
  } else if (type === 'restaurante') {
    tpl.people = '';
  }
  return tpl;
}

let editingEvent = null;

function openEventModal(type, eventId) {
  if (eventId) {
    editingEvent = currentTrip.data.events.find(e => e.id === eventId);
    if (!editingEvent) return;
    type = editingEvent.type;
  } else {
    editingEvent = newEventTemplate(type);
  }
  renderEventModal();
}

function renderEventModal() {
  const ev = editingEvent;
  const isNew = !currentTrip.data.events.find(e => e.id === ev.id);
  const html = `
    <div class="modal-backdrop" >
      <div class="modal">

function switchEventType(newType) {
  if (editingEvent.type === newType) return;

  const common = {
    id: editingEvent.id, date: editingEvent.date, time: editingEvent.time,
    title: editingEvent.title, address: editingEvent.address,
    locator: editingEvent.locator, price: editingEvent.price,
    currency: editingEvent.currency, notes: editingEvent.notes,
    timezone: editingEvent.timezone, attachments: editingEvent.attachments || []

function readFieldVal(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function saveEventForm() {
  const ev = editingEvent;
  ev.title = readFieldVal('ev-title');
  ev.date = readFieldVal('ev-date');
  ev.time = readFieldVal('ev-time');
  ev.notes = readFieldVal('ev-notes');
  ev.locator = readFieldVal('ev-locator');
  ev.price = readFieldVal('ev-price');
  ev.currency = document.getElementById('ev-currency')?.value || 'EUR';
  ev.timezone = readFieldVal('ev-timezone');
  ev.address = readFieldVal('ev-address');
  if (ev.type === 'vuelo') {
    ev.from = readFieldVal('ev-from');
    ev.to = readFieldVal('ev-to');
    ev.airline = readFieldVal('ev-airline');
    ev.flightNumber = readFieldVal('ev-flightNumber');
    ev.terminal = readFieldVal('ev-terminal');
    ev.gate = readFieldVal('ev-gate');
    ev.seat = readFieldVal('ev-seat');
    ev.dateEnd = readFieldVal('ev-dateEnd');
    ev.timeEnd = readFieldVal('ev-timeEnd');
  } else if (ev.type === 'hospedaje') {
    ev.checkInUntil = readFieldVal('ev-checkInUntil');
    ev.checkout = readFieldVal('ev-checkout');
    ev.checkOutFrom = readFieldVal('ev-checkOutFrom');
    ev.checkoutTime = readFieldVal('ev-checkoutTime');
    ev.phone = readFieldVal('ev-phone');
  } else if (ev.type === 'actividad') {
    ev.meetingPoint = readFieldVal('ev-meetingPoint');
    ev.web = readFieldVal('ev-web');
    // Leer modo actual y guardar solo los campos aplicables
    const activeTab = document.querySelector('.mode-tab.active');
    const mode = activeTab ? activeTab.dataset.mode : 'fijo';
    ev.timeMode = mode;
    if (mode === 'fijo') {
      ev.time = readFieldVal('ev-time-fijo');
      ev.duration = readFieldVal('ev-duration');
      ev.timeEnd = ''; ev.time2 = ''; ev.timeEnd2 = '';
    } else {
      ev.time = readFieldVal('ev-time-var');
      ev.timeEnd = readFieldVal('ev-timeEnd');
      ev.time2 = readFieldVal('ev-time2');
      ev.timeEnd2 = readFieldVal('ev-timeEnd2');
      ev.duration = '';
    }
  } else if (ev.type === 'restaurante') {
    ev.people = readFieldVal('ev-people');
  }
  if (!ev.title) {
    showToast('Pon un título al evento', 'error');
    return;
  }
  const existing = currentTrip.data.events.findIndex(e => e.id === ev.id);
  if (existing >= 0) {
    currentTrip.data.events[existing] = ev;
  } else {
    currentTrip.data.events.push(ev);
  }
  saveCurrentTrip().then(() => {
    closeModal();
    renderTripDetail();
    showToast('Evento guardado');
  });
}

async function deleteEvent(eventId, fromModal) {
  if (!confirm('¿Eliminar este evento?')) return;
  const idx = currentTrip.data.events.findIndex(e => e.id === eventId);
  if (idx < 0) return;
  const ev = currentTrip.data.events[idx];
  // Borrar adjuntos del evento en Firestore
  if (ev.attachments?.length) {
    const { deleteDoc, doc, db } = window.FB;
    for (const a of ev.attachments) {
      if (a.attId) {
        try { await deleteDoc(doc(db, 'users', currentUser.uid, 'attachments', a.attId)); } catch (_e) {}
      }
    }
  }
  currentTrip.data.events.splice(idx, 1);
  await saveCurrentTrip();
  if (fromModal) closeModal();
  renderTripDetail();
  showToast('Evento eliminado');
}

/* =====================================================
   ADJUNTOS (embebidos como base64 dentro del JSON)
   ===================================================== */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result; // data:mime;base64,XXXX
      const comma = result.indexOf(',');
      resolve(result.substring(comma + 1));
    };
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

function formatBytes(n) {
  if (!n) return '';
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(0) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

async function addAttachments(e) {
  const files = e.target.files;
  if (!files?.length) return;
  if (!editingEvent.attachments) editingEvent.attachments = [];
  const TOO_BIG = 950 * 1024; // 950 KB (límite Firestore ~1 MiB)
  for (const file of files) {
    if (file.size > TOO_BIG) {
      showToast(`"${file.name}" es muy grande (${formatBytes(file.size)}). Máximo 950 KB.`, 'error');
      continue;
    }
    try {
      await uploadAttachment(file);
    } catch (err) {
      console.error(err);
      showToast('Error subiendo: ' + err.message, 'error');
    }
  }
  renderEventModal();
}

async function uploadAttachment(file) {
  const { setDoc, doc, db, serverTimestamp } = window.FB;
  const data = await fileToBase64(file);
  const attId = 'att-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
  await setDoc(doc(db, 'users', currentUser.uid, 'attachments', attId), {
    name: file.name,
    mime: file.type || 'application/octet-stream',
    size: file.size,
    data: data,
    _created: serverTimestamp()
  });
  if (!editingEvent.attachments) editingEvent.attachments = [];
  editingEvent.attachments.push({
    attId: attId,
    name: file.name,
    mime: file.type || 'application/octet-stream',
    size: file.size
  });
}

async function removeAttachment(idx) {
  if (!editingEvent.attachments) return;
  const removed = editingEvent.attachments.splice(idx, 1)[0];
  if (removed && removed.attId) {
    try {
      const { deleteDoc, doc, db } = window.FB;
      await deleteDoc(doc(db, 'users', currentUser.uid, 'attachments', removed.attId));
    } catch (_e) {}
  }
  renderEventModal();
}

async function getAttachmentBlob(a) {
  // Nuevo: cargar de Firestore por attId
  if (a.attId) {
    const { getDoc, doc, db } = window.FB;
    const snap = await getDoc(doc(db, 'users', currentUser.uid, 'attachments', a.attId));
    if (snap.exists()) {
      const d = snap.data();
      const byteChars = atob(d.data);
      const bytes = new Uint8Array(byteChars.length);
      for (let i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
      return new Blob([bytes], { type: d.mime || 'application/octet-stream' });
    }
    return null;
  }
  // Compat legacy
  if (a.data) {
    const byteChars = atob(a.data);
    const bytes = new Uint8Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
    return new Blob([bytes], { type: a.mime || 'application/octet-stream' });
  }
  return null;
}

async function openAttachment(idx) {
  const a = editingEvent.attachments?.[idx];
  if (!a) return;
  try {
    const blob = await getAttachmentBlob(a);
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  } catch (e) {
    showToast('No se pudo abrir el adjunto: ' + e.message, 'error');
  }
}

async function openAttachmentFromEvent(eventId, idx) {
  const ev = currentTrip.data.events.find(e => e.id === eventId);
  if (!ev || !ev.attachments?.[idx]) return;
  try {
    const blob = await getAttachmentBlob(ev.attachments[idx]);
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  } catch (e) {
    showToast('No se pudo abrir el adjunto: ' + e.message, 'error');
  }
}

        </div>

  `;
}

function detectProvider(txt) {
  const lower = txt.toLowerCase();
  if (lower.includes('civitatis')) return 'civitatis';
  if (lower.includes('booking.com') || /booking\.?com|hotel reservation/i.test(txt)) return 'booking';
  if (lower.includes('iberia') || /\bIB\s?\d{3,4}\b/.test(txt)) return 'iberia';
  return null;
}

function runParser(provider, txt) {
  if (provider === 'iberia') return { parsed: parseIberia(txt), type: 'vuelo' };
  if (provider === 'booking') return { parsed: parseBooking(txt), type: 'hospedaje' };
  if (provider === 'civitatis') return { parsed: parseCivitatis(txt), type: 'actividad' };
  return null;
}

function parsePastedText() {
  const txt = document.getElementById('paste-input').value;
  if (!txt.trim()) { showToast('Pega el texto primero', 'error'); return; }
  const provider = detectProvider(txt);
  if (!provider) {
    showToast('No reconozco el formato. Pruébalo con Iberia, Booking o Civitatis.', 'error');
    return;
  }
  const r = runParser(provider, txt);
  editingEvent = { ...editingEvent, ...r.parsed, type: r.type };
  showToast(`Datos de ${provider} rellenados. Revisa antes de guardar.`);
  renderEventModal();
}

async function extractPdfText(file) {
  if (!window.pdfjsLib) throw new Error('La librería pdf.js no está cargada (revisa la conexión a internet).');
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    // Reconstruir líneas usando posición Y aproximada para mejor regex matching
    let lastY = null, line = '';
    const lines = [];
    for (const it of content.items) {
      const y = Math.round(it.transform[5]);
      if (lastY !== null && Math.abs(y - lastY) > 2) {
        if (line.trim()) lines.push(line.trim());
        line = '';
      }
      line += (line ? ' ' : '') + it.str;
      lastY = y;
    }
    if (line.trim()) lines.push(line.trim());
    text += lines.join('\n') + '\n';
  }
  return text;
}

async function parsePdfAndFill(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  showToast('Leyendo PDF...');
  try {
    const text = await extractPdfText(file);
    const provider = detectProvider(text);
    if (!provider) {
      await attachOneFile(file);
      showToast('PDF adjuntado, pero no reconozco el formato para auto-rellenar.', 'error');
      renderEventModal();
      return;
    }
    const r = runParser(provider, text);
    const prevAttachments = editingEvent.attachments || [];
    editingEvent = { ...editingEvent, ...r.parsed, type: r.type, attachments: prevAttachments };
    await attachOneFile(file);

    // Si es Civitatis, intentar enriquecer con la duración desde la URL de la actividad
    if (provider === 'civitatis' && !editingEvent.duration) {
      const url = extractCivitatisUrl(text);
      if (url) {
        showToast('Datos rellenados. Buscando duración en civitatis.com...');
        const dur = await fetchCivitatisDuration(url);
        if (dur) {
          editingEvent.duration = dur;
          showToast(`Datos de civitatis rellenados (duración: ${dur}). PDF adjuntado.`);
        } else {
          showToast(`Datos de civitatis rellenados. PDF adjuntado. (No pude obtener duración online.)`);
        }
        renderEventModal();
        return;
      }
    }
    showToast(`Datos de ${provider} rellenados. PDF adjuntado.`);
    renderEventModal();
  } catch (err) {
    console.error(err);
    showToast('Error procesando el PDF: ' + err.message, 'error');
  }
}

function extractCivitatisUrl(txt) {
  const txtNoWs = txt.replace(/\s+/g, '');
  const m = txtNoWs.match(/(https?:\/\/(?:www\.)?civitatis\.com\/[a-z]{2}\/[a-z0-9\-]+\/[a-z0-9\-]+\/?)/i);
  return m ? m[1] : null;
}

async function fetchCivitatisDuration(url) {
  try {
    const r = await fetch(url, { mode: 'cors', credentials: 'omit' });
    if (!r.ok) return null;
    const html = await r.text();
    // Civitatis muestra la duración con patrón "Duración" seguido de un valor
    // Probamos varios patrones comunes
    let m = html.match(/Duraci[oó]n[\s\S]{0,300}?>\s*(\d+(?:[.,]\d+)?\s*(?:h(?:oras?)?|minutos?|min)(?:\s+(?:y|and)\s+\d+\s*(?:minutos?|min))?)/i);
    if (!m) m = html.match(/duration[\s\S]{0,300}?>\s*(\d+(?:[.,]\d+)?\s*(?:h(?:oras?)?|minutos?|min))/i);
    if (!m) m = html.match(/"duration"[^"]*"([^"]+)"/i);
    if (m) {
      let dur = m[1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
      // Recortar a algo razonable
      if (dur.length < 50) return dur;
    }
  } catch (e) {
    console.log('fetchCivitatisDuration error (probablemente CORS):', e.message);
  }
  return null;
}

async function attachOneFile(file) {
  const TOO_BIG = 950 * 1024;
  if (file.size > TOO_BIG) {
    showToast(`"${file.name}" es muy grande (${formatBytes(file.size)}). Máximo 950 KB.`, 'error');
    return;
  }
  await uploadAttachment(file);
}

function parseIberia(txt) {
  const out = { type: 'vuelo' };
  // Localizador (PNR): 6 chars uppercase
  const pnr = txt.match(/(?:localizador|reserva|booking ref|PNR)[:\s]+([A-Z0-9]{6})/i);
  if (pnr) out.locator = pnr[1];
  // Número de vuelo
  const fn = txt.match(/\b(IB\s?\d{3,4})\b/);
  if (fn) out.flightNumber = fn[1].replace(/\s+/, '');
  out.airline = 'Iberia';
  // Ruta - varios formatos
  const route1 = txt.match(/\bde\s+([A-ZÁÉÍÓÚÜÑ][\wáéíóúüñ]+(?:[ ][A-ZÁÉÍÓÚÜÑ][\wáéíóúüñ]+)?)\s+a\s+([A-ZÁÉÍÓÚÜÑ][\wáéíóúüñ]+(?:[ ][A-ZÁÉÍÓÚÜÑ][\wáéíóúüñ]+)?)\b/);
  if (route1) { out.from = route1[1]; out.to = route1[2]; }
  const iata = txt.match(/\b([A-Z]{3})\s*[-→>]\s*([A-Z]{3})\b/);
  if (iata) { out.from = iata[1]; out.to = iata[2]; }
  // Fecha
  const date = txt.match(/(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{4})/);
  if (date) {
    out.date = `${date[3]}-${date[2].padStart(2,'0')}-${date[1].padStart(2,'0')}`;
  }
  // Hora salida
  const time = txt.match(/(?:salida|sale|departure)[:\s]+(\d{1,2}:\d{2})/i);
  if (time) out.time = time[1];
  // Hora llegada
  const timeEnd = txt.match(/(?:llegada|arrival)[:\s]+(\d{1,2}:\d{2})/i);
  if (timeEnd) out.timeEnd = timeEnd[1];
  // Asiento
  const seat = txt.match(/(?:asiento|seat)[:\s]+([0-9]+[A-Z])/i);
  if (seat) out.seat = seat[1];
  // Terminal
  const term = txt.match(/terminal[:\s]+([A-Z0-9]+)/i);
  if (term) out.terminal = term[1];
  out.title = out.from && out.to ? `${out.from} → ${out.to}` : 'Vuelo Iberia';
  return out;
}

function parseBooking(txt) {
  const out = { type: 'hospedaje', currency: 'EUR' };
  const MONTHS_ES = {
    'enero':1,'febrero':2,'marzo':3,'abril':4,'mayo':5,'junio':6,
    'julio':7,'agosto':8,'septiembre':9,'octubre':10,'noviembre':11,'diciembre':12
  };

  // Nombre del hotel: primera línea no vacía que parezca un nombre
  const lines = txt.split('\n').map(l => l.trim()).filter(Boolean);
  for (const line of lines.slice(0, 8)) {
    if (/^(Hotel|Hostel|Hostal|Apart|Apartamento|Casa|Riad|Camping|B&B|Pension|Pensi[oó]n|Albergue)/i.test(line)) {
      out.title = line; break;
    }
  }
  // Fallback: primera línea corta que empiece por mayúscula y no contenga ":"
  if (!out.title) {
    for (const line of lines.slice(0, 5)) {
      if (line.length > 3 && line.length < 80 && /^[A-ZÁÉÍÓÚÑ]/.test(line) && !line.includes(':') && !/^(CHECK|N[UÚ]MERO|C[OÓ]DIGO|HABITACI)/i.test(line)) {
        out.title = line; break;
      }
    }
  }

  // Número de confirmación (con o sin puntos: "6349.323.793" o "1234567890")
  const conf = txt.match(/(?:N[UÚ]MERO\s+DE\s+CONFIRMACI[OÓ]N|Confirmation\s*number)[:\s]*([\d.]+)/i);
  if (conf) out.locator = conf[1].replace(/\./g, '');

  // Dirección: una o dos líneas después de "Dirección:"
  const addrMatch = txt.match(/Direcci[oó]n[:\s]*\n?([^\n]+)(?:\n([^\n]+))?/i);
  if (addrMatch) {
    let addr = addrMatch[1].trim();
    // Si la segunda línea parece continuar la dirección (contiene CP o no contiene ":")
    if (addrMatch[2] && !addrMatch[2].includes(':') && !/^(Tel|Coord|GPS|Email)/i.test(addrMatch[2])) {
      addr += ' ' + addrMatch[2].trim();
    }
    out.address = addr.replace(/\s+/g, ' ').trim();
  }

  // Teléfono
  const phone = txt.match(/Tel[eé]fono[:\s]*([+\d][\d\s\-()]{6,25})/i);
  if (phone) out.phone = phone[1].trim();

  // Año: buscar 20XX explícito; si no, año actual
  let year = new Date().getFullYear();
  const yearMatch = txt.match(/\b(20\d{2})\b/);
  if (yearMatch) year = parseInt(yearMatch[1]);

  const monthRe = /(ENERO|FEBRERO|MARZO|ABRIL|MAYO|JUNIO|JULIO|AGOSTO|SEPTIEMBRE|OCTUBRE|NOVIEMBRE|DICIEMBRE|enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)/i;

  const toIso = (day, monthName) => {
    const mn = MONTHS_ES[monthName.toLowerCase()];
    return `${year}-${String(mn).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  };

  // ESTRATEGIA 1: anclar a marcadores CHECK-IN / CHECK-OUT (robusto frente a layouts pdf.js)
  const upper = txt.toUpperCase();
  const ciIdx = upper.indexOf('CHECK-IN');
  const coIdx = upper.indexOf('CHECK-OUT');
  // Helper para limpiar el ruido típico de Booking antes de buscar números
  const cleanNoise = (s) => s
    .replace(/HABITACIONES|NOCHES|PRECIO|hab[ií]?taci[oó]?ne?s?/gi, ' ')
    .replace(/\b\d{1,2}\s*\/\s*\d{1,2}\b/g, ' ')
    .replace(/\b1\s*habitaci[oó]n[\s\S]{0,40}/gi, ' ');

// ESTRATEGIA UNIFICADA: buscar DD MES en el texto LIMPIO (sin ruido de habitaciones/noches/etc)
  const cleanTxt = cleanNoise(txt);
  const dateRe = /\b(\d{1,2})[\s\n]+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\b/gi;
  const dateMatches = [...cleanTxt.matchAll(dateRe)];

  if (dateMatches.length >= 2) {
    // Caso ideal: dos fechas DD MES en orden documental
    out.date = toIso(dateMatches[0][1], dateMatches[0][2]);
    out.checkout = toIso(dateMatches[1][1], dateMatches[1][2]);
  } else if (dateMatches.length === 1) {
    const onlyMatch = dateMatches[0];
    const month = onlyMatch[2];
    const knownDay = parseInt(onlyMatch[1]);
    // Plan A: buscar dos días contiguos "DD DD" en el texto limpio (caso "15 17 ... MAYO")
    const twoDayMatch = cleanTxt.match(/\b(\d{1,2})\s+(\d{1,2})\b/);
    let usedTwoDay = false;
    if (twoDayMatch) {
      const a = parseInt(twoDayMatch[1]);
      const b = parseInt(twoDayMatch[2]);
      if (a >= 1 && a <= 31 && b >= 1 && b <= 31 && a !== b) {
        out.date = toIso(Math.min(a, b), month);
        out.checkout = toIso(Math.max(a, b), month);
        usedTwoDay = true;
      }
    }
    if (!usedTwoDay) {
      // Plan B: asignar el único match según a qué marcador está más cerca,
      // y buscar el OTRO día en la sección opuesta
      const matchPos = onlyMatch.index;
      const distCi = ciIdx >= 0 ? Math.abs(matchPos - ciIdx) : Infinity;
      const distCo = coIdx >= 0 ? Math.abs(matchPos - coIdx) : Infinity;
      if (distCo < distCi) {
        out.checkout = toIso(knownDay, month);
        // Buscar otro día en sección CHECK-IN
        if (ciIdx >= 0) {
          const ciEnd = coIdx > ciIdx ? coIdx : Math.min(ciIdx + 250, txt.length);
          const ciSec = cleanNoise(txt.substring(ciIdx, ciEnd));
          const nums = [...ciSec.matchAll(/\b(\d{1,2})\b/g)].map(x => parseInt(x[1])).filter(n => n >= 1 && n <= 31 && n !== knownDay);
          if (nums.length) out.date = toIso(nums[0], month);
        }
      } else {
        out.date = toIso(knownDay, month);
        // Buscar otro día en sección CHECK-OUT
        if (coIdx >= 0) {
          const coSec = cleanNoise(txt.substring(coIdx, Math.min(coIdx + 250, txt.length)));
          const nums = [...coSec.matchAll(/\b(\d{1,2})\b/g)].map(x => parseInt(x[1])).filter(n => n >= 1 && n <= 31 && n !== knownDay);
          if (nums.length) out.checkout = toIso(nums[0], month);
        }
      }
    }
  } else if (ciIdx >= 0 && coIdx >= 0) {
    // 0 fechas DD MES detectadas. Buscar día y mes por separado en cada sección
    const monthAny = cleanTxt.match(/\b(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\b/i);
    if (monthAny) {
      const month = monthAny[1];
      const ciSec = cleanNoise(txt.substring(ciIdx, coIdx > ciIdx ? coIdx : Math.min(ciIdx + 250, txt.length)));
      const coSec = cleanNoise(txt.substring(coIdx, Math.min(coIdx + 250, txt.length)));
      const ciNums = [...ciSec.matchAll(/\b(\d{1,2})\b/g)].map(x => parseInt(x[1])).filter(n => n >= 1 && n <= 31);
      const coNums = [...coSec.matchAll(/\b(\d{1,2})\b/g)].map(x => parseInt(x[1])).filter(n => n >= 1 && n <= 31);
      if (ciNums.length) out.date = toIso(ciNums[0], month);
      if (coNums.length) out.checkout = toIso(coNums[0], month);
    }
  }

  // Si las fechas terminan en el pasado, asumir año siguiente
  if (out.date) {
    const tentative = new Date(out.date + 'T12:00:00');
    const now = new Date();
    now.setMonth(now.getMonth() - 1);
    if (tentative < now && !yearMatch) {
      year++;
      out.date = `${year}${out.date.substring(4)}`;
      if (out.checkout) out.checkout = `${year}${out.checkout.substring(4)}`;
    }
  }

  // Horas: buscar todos los bloques "de HH:MM a HH:MM"
  // Primer bloque = ventana de check-in (ej: de 15:00 a 00:00)
  // Segundo bloque = ventana de check-out (ej: de 00:00 a 11:30)
  const timeRe = /de\s+(\d{1,2}:\d{2})\s+a\s+(\d{1,2}:\d{2})/g;
  const timeMatches = [...txt.matchAll(timeRe)];
  if (timeMatches.length >= 1) {
    out.time = timeMatches[0][1];          // check-in: hora de inicio (15:00)
    out.checkInUntil = timeMatches[0][2];   // check-in: hora límite (00:00)
  }
  if (timeMatches.length >= 2) {
    out.checkOutFrom = timeMatches[1][1];   // check-out: hora desde la que se puede salir (00:00)
    out.checkoutTime = timeMatches[1][2];   // check-out: hora límite para salir (11:30)
  }

  // Precio total: el mayor de los importes con €
  const priceMatches = [...txt.matchAll(/€\s*(\d{1,5}(?:[.,]\d{1,2})?)/g)].map(m => parseFloat(m[1].replace(',', '.')));
  if (priceMatches.length) {
    out.price = String(Math.max(...priceMatches));
  } else {
    const altPrice = [...txt.matchAll(/(\d{1,5}(?:[.,]\d{1,2})?)\s*€/g)].map(m => parseFloat(m[1].replace(',', '.')));
    if (altPrice.length) out.price = String(Math.max(...altPrice));
  }

  // Detectar otras monedas
  if (/£/.test(txt)) out.currency = 'GBP';
  else if (/\$\s*\d/.test(txt) && !out.price) out.currency = 'USD';

  if (!out.title) out.title = 'Hospedaje (Booking)';
  return out;
}

function parseCivitatis(txt) {
  const out = { type: 'actividad', currency: 'EUR' };
  const MONTHS_ES = {
    'enero':1,'febrero':2,'marzo':3,'abril':4,'mayo':5,'junio':6,
    'julio':7,'agosto':8,'septiembre':9,'octubre':10,'noviembre':11,'diciembre':12
  };

  // ESTRATEGIA 1: extraer entre "BOOKING DETAILS" y "RESERVA / ID" (lo más fiable)
  const sectionMatch = txt.match(/(?:BOOKING\s+DETAILS|RESERVA\s+DE\s+ACTIVIDAD)([\s\S]*?)(?:RESERVA\s*\/\s*ID|FECHA\s*\/\s*DATE|A\d{6,10})/i);
  if (sectionMatch) {
    const sec = sectionMatch[1];
    const titleLines = sec.split('\n')
      .map(l => l.replace(/\s+/g, ' ').trim())
      .filter(l => l && l.length > 5 && l.length < 200
                && !/^(ACTIVIDADES|RESERVA|BOOKING|FECHA|HORA|PERSONAS|IDIOMA|SUPPLIER)/i.test(l)
                && !/civitatis/i.test(l));
    if (titleLines.length) {
      let best = titleLines[0];
      for (const l of titleLines) if (l.length > best.length) best = l;
      out.title = 'Civitatis · ' + best;
    }
  }

  // ESTRATEGIA 2: buscar líneas que empiecen por palabras típicas de actividades Civitatis
  // CASE-SENSITIVE: el prefijo debe ir con mayúscula inicial (como en títulos reales).
  // Así evitamos coger fragmentos de descripción tipo "entrada principal de la..." (minúscula).
  if (!out.title) {
    const activityPrefix = /^(?:Visita|Tour|Free\s+tour|Free\s+Tour|Excursi[oó]n|Entrada|Paseo|Crucero|Catamar[aá]n|Espect[aá]culo|Show|Ruta|Cata|Taller|Subida|Recorrido|Safari|Senderismo|Buceo|Snorkel|Kayak|Vuelo\s+en|Aventura)\b/;
    const endsInPreposition = /\s(?:de|por|para|con|sin|a|en|hacia|hasta|desde|del|la|el|los|las)$/i;
    const candidates = txt.split('\n')
      .map(l => l.replace(/\s+/g, ' ').trim())
      .filter(l => l.length >= 12 && l.length <= 200)
      .filter(l => activityPrefix.test(l))
      // Rechazar líneas con paréntesis sin cerrar (son fragmentos)
      .filter(l => (l.match(/\(/g) || []).length === (l.match(/\)/g) || []).length)
      // Rechazar líneas que terminan en preposición (claramente cortadas)
      .filter(l => !endsInPreposition.test(l))
      // Rechazar líneas que terminan con coma o "y" suelta (fragmento)
      .filter(l => !/[,;]\s*$/.test(l) && !/\sy\s*$/i.test(l));
    if (candidates.length) {
      let best = candidates[0];
      for (const c of candidates) if (c.length > best.length) best = c;
      best = best.replace(/\s*[-–—]\s*Tour\s+(?:en|in)\s+\S+\s*$/i, '');
      out.title = 'Civitatis · ' + best;
    }
  }

  // ESTRATEGIA 3: extraer slug de la URL (último recurso si las dos anteriores fallaron)
  if (!out.title) {
    const txtNoWs = txt.replace(/\s+/g, '');
    const urlMatch = txtNoWs.match(/civitatis\.com\/[a-z]{2}\/[a-z0-9\-]+?\/([a-z0-9\-]+?)(?:-\d{3,})?\//i);
    if (urlMatch) {
      const slug = urlMatch[1].replace(/-\d{3,}$/, '').replace(/-/g, ' ');
      const titled = slug.split(' ').map(w => w.length > 2 ? w.charAt(0).toUpperCase() + w.slice(1) : w).join(' ');
      out.title = 'Civitatis · ' + titled;
    }
  }

  // ESTRATEGIA 3: fallback por líneas, rechazando nombres de personas y otras cosas
  if (!out.title) {
    const dateAnywhere = /(?:lunes|martes|mi[eé]rcoles|jueves|viernes|s[aá]bado|domingo)\b[\s\S]{0,30}?\b\d{1,2}\b|\b\d{1,2}\s+(?:enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)/i;
    const skipPrefixes = /^(ACTIVIDADES|RESERVA|FECHA|HORA|PERSONAS|IDIOMA|SUPPLIER|DATOS|PRECIO|IMPORTE|DIRECCI|INFORMACI|CONDICIONES|civitatis|BOOKING|GUEST|PROVIDER|ADDITIONAL|Toda|Al reservar|La actividad|Sólo|Si necesit|Recuerda|Reconoceréis|Importante|Si no|Pagado|Impuestos|Email|Tel|Free tour es|Recordamos|\+?\d|lunes|martes|mi[eé]rcoles|jueves|viernes|s[aá]bado|domingo)/i;
    // Patrón de nombre de persona: 2-4 palabras con primera letra mayúscula y resto minúsculas
    const looksLikeName = /^[A-ZÁÉÍÓÚÑ][a-záéíóúñ]{1,15}(?:\s+[A-ZÁÉÍÓÚÑ][a-záéíóúñ]{1,15}){1,3}$/;
    const looksLikeRef = /^[A-Z0-9][A-Z0-9\-]{4,25}$/;
    const lines = txt.split('\n').map(l => l.replace(/\s+/g, ' ').trim()).filter(l => l.length > 3);
    let titleCandidate = null;
    for (const line of lines) {
      if (skipPrefixes.test(line)) continue;
      if (dateAnywhere.test(line)) continue;
      if (looksLikeName.test(line)) continue;
      if (looksLikeRef.test(line)) continue;
      if (line.length < 8 || line.length > 200) continue;
      if (line.includes('@') || line.includes('http')) continue;
      titleCandidate = line;
      break;
    }
    if (titleCandidate) out.title = 'Civitatis · ' + titleCandidate;
  }

  // Localizador: "A" + 6-10 dígitos, o patrón explícito "RESERVA / ID"
  const idMatch = txt.match(/RESERVA\s*\/\s*ID[\s\S]{0,80}?\b(A\d{6,10})\b/i) || txt.match(/\b(A\d{6,10})\b/);
  if (idMatch) out.locator = idMatch[1];

  // Fecha en formato "Domingo 17 mayo/26" o "17 mayo 2026" o "17 de mayo de 2026"
  // 1) Día de la semana + DD + mes + /YY o /YYYY
  let dm = txt.match(/(?:lunes|martes|mi[eé]rcoles|jueves|viernes|s[aá]bado|domingo)\s+(\d{1,2})\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\s*\/\s*(\d{2,4})/i);
  if (!dm) {
    // 2) DD mes/YY
    dm = txt.match(/\b(\d{1,2})\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\s*\/\s*(\d{2,4})\b/i);
  }
  if (!dm) {
    // 3) DD (de) mes (de) YYYY
    dm = txt.match(/\b(\d{1,2})\s+(?:de\s+)?(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\s+(?:de\s+)?(\d{4})\b/i);
  }
  if (dm) {
    let year = dm[3];
    if (year.length === 2) year = '20' + year;
    const m = MONTHS_ES[dm[2].toLowerCase()];
    out.date = `${year}-${String(m).padStart(2,'0')}-${dm[1].padStart(2,'0')}`;
  } else {
    // 4) DD/MM/YYYY
    const date2 = txt.match(/\b(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{4})\b/);
    if (date2) out.date = `${date2[3]}-${date2[2].padStart(2,'0')}-${date2[1].padStart(2,'0')}`;
  }

  // Hora: "11:00 h" o "Hora: 11:00"
  const time = txt.match(/\b(\d{1,2}:\d{2})\s*h\b/i)
            || txt.match(/(?:hora|inicio|a las|HORA\s*\/\s*HOUR)[:\s]*(\d{1,2}:\d{2})/i);
  if (time) out.time = time[1];

  // Dirección: línea tras "DIRECCIÓN / ADDRESS"
  const addr = txt.match(/DIRECCI[OÓ]N(?:\s*\/\s*ADDRESS)?[\s\n]+([^\n]+)/i);
  if (addr) out.address = addr[1].trim().replace(/\.$/, '');

  // Punto de encuentro: dentro de INFORMACIÓN ADICIONAL
  const meetSection = txt.match(/INFORMACI[OÓ]N\s+ADICIONAL[\s\S]{0,500}/i);
  if (meetSection) {
    const sec = meetSection[0];
    const m1 = sec.match(/(?:nos\s+encontraremos\s+en|punto\s+de\s+encuentro|encuentro|meeting\s+point)[\s:]*([^\n.(]{5,200})/i);
    if (m1) out.meetingPoint = m1[1].trim().replace(/\s+/g, ' ');
    else {
      // fallback: primera frase descriptiva tras la cabecera
      const firstSentence = sec.replace(/INFORMACI[OÓ]N\s+ADICIONAL[^\n]*/i, '').match(/[A-ZÁÉÍÓÚÑ][^.\n]{15,200}\./);
      if (firstSentence) out.meetingPoint = firstSentence[0].trim();
    }
  } else {
    const m1 = txt.match(/(?:nos\s+encontraremos\s+en|punto\s+de\s+encuentro|encuentro)[\s:]*([^\n.(]{5,200})/i);
    if (m1) out.meetingPoint = m1[1].trim();
  }

  // Duración
  const dur = txt.match(/(?:duraci[oó]n)[:\s]+([^\n]{2,40})/i);
  if (dur) out.duration = dur[1].trim();

  // Personas
  const people = txt.match(/(\d+)\s*adulto/i) || txt.match(/PERSONAS\s*\/\s*PAX[\s\S]{0,50}?\b(\d+)\b/i);
  if (people) out.people = people[1];

  // Precio: "IMPORTE TOTAL" seguido del importe + €, o tomar el mayor de los € si hay varios
  const importe = txt.match(/IMPORTE\s+TOTAL[\s\S]{0,80}?(\d{1,5}(?:[.,]\d{1,2})?)\s*€/i);
  if (importe) {
    out.price = importe[1].replace(',', '.');
  } else {
    const allE = [...txt.matchAll(/(\d{1,5}(?:[.,]\d{1,2})?)\s*€/g)].map(m => parseFloat(m[1].replace(',', '.')));
    if (allE.length) out.price = String(Math.max(...allE));
  }

  if (!out.title) out.title = 'Civitatis · Actividad';
  return out;
}
