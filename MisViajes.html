async function exportTrip() {
  const m = currentTrip.data.meta;
  const slug = slugify(m.name) || 'viaje';
  try {
    showToast('Generando ' + slug + '.html...');
    await exportHTML(slug);
    showToast('Exportado: ' + slug + '.html (listo para enviar al móvil)', 'success');
  } catch (e) {
    console.error(e);
    showToast('Error exportando: ' + e.message, 'error');
  }
}

function getSortedEvents() {
  return [...(currentTrip.data.events || [])].sort((a, b) => {
    const ka = (a.date || '') + (a.time || '00:00');
    const kb = (b.date || '') + (b.time || '00:00');
    return ka.localeCompare(kb);
  });
}

async function exportPDF(slug) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const m = currentTrip.data.meta;
  const events = getSortedEvents();
  const W = 210, H = 297, ML = 15, MR = 15, MT = 18;
  let y = MT;

  // Cover
  doc.setFillColor(37, 99, 235);
  doc.rect(0, 0, W, 60, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(28); doc.setFont('helvetica', 'bold');
  doc.text(m.name || 'Mi viaje', ML, 32);
  doc.setFontSize(13); doc.setFont('helvetica', 'normal');
  doc.text(formatDateRange(m.startDate, m.endDate), ML, 42);
  if (m.destinations?.length) doc.text(m.destinations.join(' · '), ML, 50);

  doc.setTextColor(30, 41, 59);
  y = 75;

  if (m.notes) {
    doc.setFontSize(10); doc.setFont('helvetica', 'italic');
    const lines = doc.splitTextToSize(m.notes, W - ML - MR);
    doc.text(lines, ML, y); y += lines.length * 5 + 6;
  }

  // Build grouped by date
  const grouped = {};
  events.forEach(e => {
    const k = e.date || 'sin-fecha';
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(e);
  });
  const dates = Object.keys(grouped).filter(d => d !== 'sin-fecha').sort();
  if (grouped['sin-fecha']) dates.push('sin-fecha');

  const ensure = (h) => { if (y + h > H - 15) { doc.addPage(); y = MT; } };

  for (const date of dates) {
    ensure(15);
    doc.setDrawColor(226, 232, 240);
    doc.line(ML, y, W - MR, y); y += 4;
    doc.setFontSize(14); doc.setFont('helvetica', 'bold');
    doc.setTextColor(37, 99, 235);
    if (date === 'sin-fecha') {
      doc.text('Sin fecha asignada', ML, y);
    } else {
      const dayNum = m.startDate ? daysBetween(m.startDate, date) + 1 : null;
      doc.text((dayNum && dayNum >= 1 ? `Día ${dayNum} · ` : '') + formatDate(date), ML, y);
    }
    y += 8;

    const TYPE_LABEL_PDF = { vuelo: '[VUELO]', hospedaje: '[HOTEL]', actividad: '[ACTIVIDAD]', restaurante: '[RESTAURANTE]', nota: '[NOTA]' };
    for (const ev of grouped[date]) {
      ensure(20);
      doc.setTextColor(15, 23, 42);
      doc.setFontSize(11); doc.setFont('helvetica', 'bold');
      const time = ev.time ? formatTime(ev.time) + (ev.timeEnd ? ' -> ' + formatTime(ev.timeEnd) : '') + '  ' : '';
      const tag = TYPE_LABEL_PDF[ev.type] || '';
      doc.text(`${time}${tag} ${ev.title || TYPE_LABEL[ev.type] || ''}`, ML + 2, y);
      y += 5;
      doc.setFontSize(10); doc.setFont('helvetica', 'normal');
      doc.setTextColor(71, 85, 105);

      const detailLines = [];
      if (ev.type === 'vuelo') {
        if (ev.airline || ev.flightNumber) detailLines.push(`${ev.airline || ''} ${ev.flightNumber || ''}`.trim());
        if (ev.from || ev.to) detailLines.push(`${ev.from || ''} -> ${ev.to || ''}`);
        if (ev.terminal || ev.gate) detailLines.push(`Terminal ${ev.terminal || '-'}${ev.gate ? ', puerta ' + ev.gate : ''}`);
        if (ev.seat) detailLines.push(`Asiento ${ev.seat}`);
      } else if (ev.type === 'hospedaje') {
        if (ev.checkout) detailLines.push(`Check-out: ${formatDate(ev.checkout)}`);
        if (ev.address) detailLines.push(ev.address);
        if (ev.phone) detailLines.push(`Tel: ${ev.phone}`);
      } else {
        if (ev.address) detailLines.push(ev.address);
        if (ev.meetingPoint) detailLines.push(`Punto de encuentro: ${ev.meetingPoint}`);
        if (ev.duration) detailLines.push(`Duracion: ${ev.duration}`);
        if (ev.people) detailLines.push(`Comensales: ${ev.people}`);
      }
      if (ev.locator) detailLines.push(`Loc: ${ev.locator}`);
      if (ev.price) detailLines.push(`${ev.price} ${ev.currency || ''}`.trim());
      if (ev.notes) detailLines.push(`Notas: ${ev.notes}`);
      if (ev.attachments?.length) {
        detailLines.push(`Adjuntos (${ev.attachments.length}): ${ev.attachments.map(a => a.name).join(', ')}`);
      }

      for (const line of detailLines) {
        const wrapped = doc.splitTextToSize(line, W - ML - MR - 4);
        ensure(wrapped.length * 4 + 1);
        doc.text(wrapped, ML + 4, y); y += wrapped.length * 4 + 0.5;
      }
      y += 4;
    }
  }

  // Footer en cada página
  const total = doc.getNumberOfPages();
  for (let i = 1; i <= total; i++) {
    doc.setPage(i);
    doc.setFontSize(8); doc.setTextColor(148, 163, 184);
    doc.text(`${m.name || ''}  ·  ${i} / ${total}`, W - MR, H - 8, { align: 'right' });
  }

  const blob = doc.output('blob');
  await saveBlobToTripFolder(blob, slug + '.pdf');
}

async function exportHTML(slug) {
  const m = currentTrip.data.meta;
  const allEvents = getSortedEvents();
  const hospedajes = allEvents.filter(e => e.type === 'hospedaje');
  const events = allEvents.filter(e => e.type !== 'hospedaje');

  // Días entre startDate y endDate
  const days = [];
  if (m.startDate && m.endDate) {
    const total = daysBetween(m.startDate, m.endDate) + 1;
    for (let i = 0; i < total; i++) days.push(addDays(m.startDate, i));
  }
  events.forEach(e => { if (e.date && !days.includes(e.date)) days.push(e.date); });
  days.sort();

  // Agrupar eventos por día (sin hospedajes — esos van como banner)
  const grouped = {};
  for (const ev of events) {
    const k = ev.date || 'sin-fecha';
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(ev);
  }
  // Inyectar pseudo check-in/check-out por día
  for (const h of hospedajes) {
    if (h.date) {
      if (!grouped[h.date]) grouped[h.date] = [];
      grouped[h.date].push({
        _pseudo: true, _kind: 'checkin', type: 'hospedaje',
        title: 'Check-in ' + (h.title || 'Hospedaje'),
        time: h.time || '', timeEnd: h.checkInUntil || '',
        _sortTime: h.time || '15:00',
        address: h.address, attachments: h.attachments
      });
    }
    if (h.checkout) {
      if (!grouped[h.checkout]) grouped[h.checkout] = [];
      const coFrom = h.checkOutFrom || '';
      const coTo = h.checkoutTime || '';
      grouped[h.checkout].push({
        _pseudo: true, _kind: 'checkout', type: 'hospedaje',
        title: 'Check-out ' + (h.title || 'Hospedaje'),
        time: coFrom || coTo, timeEnd: (coFrom && coTo) ? coTo : '',
        _sortTime: coTo || coFrom || '11:00',
        address: h.address
      });
    }
  }
  // Ordenar por hora dentro de cada día
  for (const k in grouped) {
    grouped[k].sort((a, b) => (a._sortTime || a.time || '00:00').localeCompare(b._sortTime || b.time || '00:00'));
  }
  if (!days.includes('sin-fecha') && grouped['sin-fecha']) days.push('sin-fecha');

  // Pre-cargar todos los adjuntos como base64 (lee del disco si están en /adjuntos/)
  async function loadBase64(a) {
    if (a.data) return a.data;
    // Nuevo: attId de Firestore
    if (a.attId) {
      try {
        const { getDoc, doc, db } = window.FB;
        const snap = await getDoc(doc(db, 'users', currentUser.uid, 'attachments', a.attId));
        if (snap.exists()) return snap.data().data;
      } catch (e) {
        console.warn('Adjunto no encontrado:', a.attId, e);
      }
      return null;
    }
    if (a.filename) return null; // legacy no soportado en Firestore
    return null;
  }
  // Cargar base64 de cada adjunto y guardarlo en _b64 temporalmente
  for (const ev of allEvents) {
    if (ev.attachments?.length) {
      for (const a of ev.attachments) {
        a._b64 = await loadBase64(a);
      }
    }
  }
  // Generamos un id único para cada adjunto y almacenamos su base64 en window.__att
  // El click usa Blob URL (más compatible que data: en WhatsApp/Safari)
  let attCounter = 0;
  const attachLinkHtml = (a, i) => {
    const b64 = a._b64 || a.data;
    if (!b64) return `<div class="attach-missing">📎 ${escapeHtml(a.name)} (no encontrado)</div>`;
    const isImg = (a.mime || '').startsWith('image/');
    const mime = a.mime || 'application/octet-stream';
    const dataUri = `data:${mime};base64,${b64}`;
    const blobName = escapeHtml(a.name);
    const icon = isImg ? '🖼️' : '📎';
    const content = isImg
      ? `<img class="attach-img" src="${dataUri}" alt="${blobName}">`
      : `<embed class="attach-pdf" src="${dataUri}" type="${mime}">`;
    // <details> nativo: pulsa el summary para desplegar/colapsar
    return `<details class="attach-inline"><summary class="attach-head"><span class="attach-icon">${icon}</span><span class="attach-name">${blobName}</span><a class="attach-dl" href="${dataUri}" download="${blobName}" onclick="event.stopPropagation()">Descargar</a></summary>${content}</details>`;
  };

  const renderHospedaje = h => {
    const inDate = h.date ? formatDateShort(h.date) : '—';
    const outDate = h.checkout ? formatDateShort(h.checkout) : '—';
    const nights = h.date && h.checkout ? daysBetween(h.date, h.checkout) : null;
    const inWindow = h.time ? (h.checkInUntil ? `${formatTime(h.time)} → ${formatTime(h.checkInUntil)}` : `desde ${formatTime(h.time)}`) : '';
    const outWindow = h.checkoutTime ? (h.checkOutFrom ? `${formatTime(h.checkOutFrom)} → ${formatTime(h.checkoutTime)}` : `hasta ${formatTime(h.checkoutTime)}`) : '';
    const tags = [];
    if (h.locator) tags.push(`Loc: ${escapeHtml(h.locator)}`);
    if (h.price) tags.push(`${escapeHtml(h.price)} ${escapeHtml(h.currency || '')}`);
    if (nights) tags.push(`${nights} noche${nights === 1 ? '' : 's'}`);
    const attachs = (h.attachments || []).map(attachLinkHtml).join('');
    return `
      <div class="hosp">
        <div class="hosp-head"><div class="hosp-icon">🏨</div><div class="hosp-title">${escapeHtml(h.title || 'Hospedaje')}</div></div>
        <div class="hosp-row">
          <div><span class="lbl">Desde</span><span class="val">${escapeHtml(inDate)}</span></div>
          <div class="arrow">→</div>
          <div><span class="lbl">Hasta</span><span class="val">${escapeHtml(outDate)}</span></div>
        </div>
        ${inWindow ? `<div class="hosp-detail"><strong>Check-in:</strong> ${escapeHtml(inWindow)}</div>` : ''}
        ${outWindow ? `<div class="hosp-detail"><strong>Check-out:</strong> ${escapeHtml(outWindow)}</div>` : ''}
        ${h.address ? `<div class="hosp-detail">📍 <a href="${mapsUrl(h.address)}" target="_blank">${escapeHtml(h.address)}</a></div>` : ''}
        ${h.phone ? `<div class="hosp-detail">☎️ <a href="tel:${escapeHtml(h.phone)}">${escapeHtml(h.phone)}</a></div>` : ''}
        ${h.notes ? `<div class="hosp-detail">📝 ${escapeHtml(h.notes)}</div>` : ''}
        ${tags.length ? `<div class="ev-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
        ${attachs ? `<div class="ev-attachments">${attachs}</div>` : ''}
      </div>
    `;
  };

  const renderEv = ev => {
    const detailLines = [];
    const emoji = ev._pseudo ? (ev._kind === 'checkin' ? '🛬' : '🛫') : (TYPE_EMOJI[ev.type] || '📍');
    if (!ev._pseudo) {
      if (ev.type === 'vuelo') {
        if (ev.airline || ev.flightNumber) detailLines.push(`<div>${escapeHtml(ev.airline || '')} ${escapeHtml(ev.flightNumber || '')}</div>`);
        if (ev.from || ev.to) detailLines.push(`<div>${escapeHtml(ev.from || '')} → ${escapeHtml(ev.to || '')}</div>`);
        if (ev.terminal || ev.gate) detailLines.push(`<div>Terminal ${escapeHtml(ev.terminal || '-')}${ev.gate ? ', puerta ' + escapeHtml(ev.gate) : ''}</div>`);
        if (ev.seat) detailLines.push(`<div>Asiento ${escapeHtml(ev.seat)}</div>`);
      } else {
        if (ev.address) detailLines.push(`<div>📍 <a href="${mapsUrl(ev.address)}" target="_blank">${escapeHtml(ev.address)}</a></div>`);
        if (ev.meetingPoint) detailLines.push(`<div>🚩 ${escapeHtml(ev.meetingPoint)}</div>`);
        if (ev.duration) detailLines.push(`<div>⏱️ ${escapeHtml(ev.duration)}</div>`);
        if (ev.people) detailLines.push(`<div>👥 ${escapeHtml(ev.people)} comensales</div>`);
        if (ev.web) detailLines.push(`<div>🔗 <a href="${escapeHtml(ev.web)}" target="_blank" rel="noopener">${escapeHtml(ev.web)}</a></div>`);
      }
    } else {
      if (ev.address) detailLines.push(`<div>📍 <a href="${mapsUrl(ev.address)}" target="_blank">${escapeHtml(ev.address)}</a></div>`);
    }
    const tags = [];
    if (!ev._pseudo) {
      if (ev.locator) tags.push(`Loc: ${escapeHtml(ev.locator)}`);
      if (ev.price) tags.push(`${escapeHtml(ev.price)} ${escapeHtml(ev.currency || '')}`);
    }
    // Hora con duración calculada + horario partido si aplica
    let timeText = '';
    if (ev.time) {
      timeText = formatTime(ev.time);
      let end = ev.timeEnd;
      if (!end && ev.duration) end = computeEndTime(ev.time, ev.duration);
      if (end) timeText += ' → ' + formatTime(end);
      if (ev.time2) {
        timeText += ' · ' + formatTime(ev.time2);
        if (ev.timeEnd2) timeText += ' → ' + formatTime(ev.timeEnd2);
      }
    } else {
      timeText = 'Todo el día';
    }
    const attachLinks = !ev._pseudo ? (ev.attachments || []).map(attachLinkHtml).join('') : '';
    return `
      <div class="ev ${ev.type}${ev._pseudo ? ' pseudo' : ''}">
        <div class="ev-icon">${emoji}</div>
        <div class="ev-body">
          <div class="ev-time">${escapeHtml(timeText)}</div>
          <div class="ev-title">${escapeHtml(ev.title || TYPE_LABEL[ev.type])}</div>
          ${detailLines.join('')}
          ${ev.notes && !ev._pseudo ? `<div class="ev-notes">📝 ${escapeHtml(ev.notes)}</div>` : ''}
          ${tags.length ? `<div class="ev-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
          ${attachLinks ? `<div class="ev-attachments">${attachLinks}</div>` : ''}
        </div>
      </div>
    `;
  };

  const html = `<!DOCTYPE html>

async function exportICS(slug) {
  const m = currentTrip.data.meta;
  const events = getSortedEvents();
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//MisViajes//ES',
    'CALSCALE:GREGORIAN',
    `X-WR-CALNAME:${m.name || 'Viaje'}`
  ];
  const fmtDateTime = (d, t) => {
    if (!d) return null;
    const [y, mo, da] = d.split('-');
    if (t) {
      const [hh, mm] = t.split(':');
      return `${y}${mo}${da}T${hh}${mm}00`;
    }
    return `${y}${mo}${da}`;
  };
  const escIcs = s => String(s || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
  for (const ev of events) {
    if (!ev.date) continue;
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${ev.id}@misviajes`);
    lines.push(`DTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z`);
    if (ev.type === 'hospedaje' && ev.checkout) {
      if (ev.time) {
        lines.push(`DTSTART:${fmtDateTime(ev.date, ev.time)}`);
        lines.push(`DTEND:${fmtDateTime(ev.checkout, ev.checkoutTime || '11:00')}`);
      } else {
        lines.push(`DTSTART;VALUE=DATE:${fmtDateTime(ev.date)}`);
        lines.push(`DTEND;VALUE=DATE:${fmtDateTime(ev.checkout)}`);
      }
    } else if (ev.time) {
      lines.push(`DTSTART:${fmtDateTime(ev.date, ev.time)}`);
      let endDate = ev.dateEnd || ev.date;
      let endTime = ev.timeEnd || (() => {
        const [hh, mm] = ev.time.split(':');
        const total = parseInt(hh) * 60 + parseInt(mm) + 60;
        return String(Math.floor(total/60) % 24).padStart(2,'0') + ':' + String(total%60).padStart(2,'0');
      })();
      lines.push(`DTEND:${fmtDateTime(endDate, endTime)}`);
    } else {
      lines.push(`DTSTART;VALUE=DATE:${fmtDateTime(ev.date)}`);
    }
    const summary = `${TYPE_EMOJI[ev.type] || ''} ${ev.title || TYPE_LABEL[ev.type] || ''}`.trim();
    lines.push(`SUMMARY:${escIcs(summary)}`);
    const descParts = [];
    if (ev.type === 'vuelo' && (ev.airline || ev.flightNumber)) descParts.push(`${ev.airline || ''} ${ev.flightNumber || ''}`.trim());
    if (ev.from || ev.to) descParts.push(`${ev.from || ''} → ${ev.to || ''}`);
    if (ev.terminal) descParts.push(`Terminal ${ev.terminal}`);
    if (ev.seat) descParts.push(`Asiento ${ev.seat}`);
    if (ev.meetingPoint) descParts.push(`Punto encuentro: ${ev.meetingPoint}`);
    if (ev.locator) descParts.push(`Loc: ${ev.locator}`);
    if (ev.price) descParts.push(`${ev.price} ${ev.currency || ''}`.trim());
    if (ev.notes) descParts.push(ev.notes);
    if (descParts.length) lines.push(`DESCRIPTION:${escIcs(descParts.join('\n'))}`);
    if (ev.address) lines.push(`LOCATION:${escIcs(ev.address)}`);
    lines.push('END:VEVENT');
  }
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar' });
  await saveBlobToTripFolder(blob, slug + '.ics');
}

/* AÑADIR EVENTO DESDE ACTIVIDAD GUARDADA */
async function openAddFromSavedActivities() {
  // Cargar actividades si no están cargadas
  if (!allActivities.length) {
    try { await loadActivities(); } catch (_) {}
  }
  if (!allActivities.length) {
    showToast('No tienes actividades guardadas todavía. Añádelas en la pestaña "Actividades".', 'error');
    return;
  }
  // Sugerir actividades cuya provincia esté en las destinos del viaje
  const dests = (currentTrip.data.meta.destinations || []).map(d => d.trim().toLowerCase());
  const suggested = allActivities.filter(a => dests.some(d => (a.province || '').toLowerCase().includes(d) || d.includes((a.province || '').toLowerCase())));
  const others = allActivities.filter(a => !suggested.includes(a));
  
  const renderRow = (a) => `
    <div class="act-picker-row" onclick="addActivityToTrip('${a.id}')">
      ${a.photo ? `<img src="${a.photo}" class="act-picker-photo">` : `<div class="act-picker-photo act-photo-empty">${escapeHtml((a.title||'?')[0].toUpperCase())}</div>`}
      <div>
        <div style="font-weight:600">${escapeHtml(a.title||'')}</div>
        <div style="font-size:12px;color:var(--text-soft)">${escapeHtml(a.province||'')} · ${a.audience==='con-ninos'?'👨‍👩‍👧':'🍷'}${a.duration?' · ⏱️ ' + escapeHtml(a.duration):''}${a.price?' · 💰 ' + escapeHtml(a.price):''}</div>
      </div>
    </div>
  `;
  
  openModalHtml(`
    <div class="modal-backdrop">
      <div class="modal">
        <div class="modal-header">
          <h3>📌 Añadir desde actividades guardadas</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <p style="color:var(--text-soft);font-size:13px;margin:0 0 12px">Pulsa una actividad para añadirla al viaje.</p>
          ${suggested.length ? `
            <div style="font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px">Sugeridas por provincia (${suggested.length})</div>
            ${suggested.map(renderRow).join('')}
          ` : ''}
          ${others.length ? `
            <div style="font-size:12px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 6px">Otras actividades (${others.length})</div>
            ${others.map(renderRow).join('')}
          ` : ''}
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        </div>
      </div>
    </div>
  `);
}

/* RESUMEN DE GASTOS PDF */
const TYPE_LABEL_PDF_EXP = {
  vuelo: 'Vuelos y transportes',
  hospedaje: 'Hospedaje',
  actividad: 'Actividades',
  restaurante: 'Restaurantes',
  nota: 'Notas'

async function exportExpensesPDF() {
  try {
    if (!window.jspdf) { showToast('jsPDF no está cargado (revisa la conexión)', 'error'); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const m = currentTrip.data.meta;
    const events = [...(currentTrip.data.events || [])].filter(e => e.price && parseFloat(String(e.price).replace(',', '.')) > 0);

    const W = 210, H = 297, ML = 15, MR = 15;
    let y = 18;

    // Cover
    doc.setFillColor(37, 99, 235);
    doc.rect(0, 0, W, 50, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(22); doc.setFont('helvetica', 'bold');
    doc.text('Resumen de gastos', ML, 24);
    doc.setFontSize(13); doc.setFont('helvetica', 'normal');
    doc.text(m.name || 'Viaje', ML, 33);
    doc.setFontSize(10);
    doc.text(formatDateRange(m.startDate, m.endDate), ML, 41);

    doc.setTextColor(30, 41, 59);
    y = 62;

    if (events.length === 0) {
      doc.setFontSize(12); doc.setFont('helvetica', 'italic');
      doc.text('No hay gastos registrados en este viaje todavía.', ML, y);
      const blob = doc.output('blob');
      await saveBlobToTripFolder(blob, (slugify(m.name) || 'viaje') + '-gastos.pdf');
      showToast('Resumen de gastos exportado (sin gastos)');
      return;
    }

    // Agrupar por tipo y sumar por moneda
    const byType = {};
    const totalsByCurrency = {};
    for (const ev of events) {
      if (!byType[ev.type]) byType[ev.type] = [];
      byType[ev.type].push(ev);
      const amt = parseFloat(String(ev.price).replace(',', '.'));
      const cur = ev.currency || 'EUR';
      totalsByCurrency[cur] = (totalsByCurrency[cur] || 0) + amt;
    }

    // Total general
    doc.setFontSize(12); doc.setFont('helvetica', 'bold');
    doc.setTextColor(37, 99, 235);
    doc.text('TOTAL', ML, y);
    y += 6;
    doc.setFontSize(11); doc.setFont('helvetica', 'normal');
    doc.setTextColor(30, 41, 59);
    for (const cur of Object.keys(totalsByCurrency)) {
      doc.text(`${totalsByCurrency[cur].toFixed(2)} ${cur}`, ML + 4, y);
      y += 5;
    }
    y += 4;

    // Detalle por categoría
    const ensure = (h) => { if (y + h > H - 15) { doc.addPage(); y = 18; } };
    const orderedTypes = ['vuelo', 'hospedaje', 'actividad', 'restaurante', 'nota'];
    for (const type of orderedTypes) {
      if (!byType[type]) continue;
      ensure(20);
      doc.setDrawColor(226, 232, 240);
      doc.line(ML, y, W - MR, y); y += 4;
      doc.setFontSize(13); doc.setFont('helvetica', 'bold');
      doc.setTextColor(37, 99, 235);
      const label = TYPE_LABEL_PDF_EXP[type] || type;
      doc.text(label, ML, y);
      // subtotal por categoría
      let subtotal = 0, subCur = 'EUR';
      for (const ev of byType[type]) {
        subtotal += parseFloat(String(ev.price).replace(',', '.'));
        if (ev.currency) subCur = ev.currency;
      }
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(71, 85, 105);
      doc.text(`${subtotal.toFixed(2)} ${subCur}`, W - MR, y, { align: 'right' });
      y += 8;

      // Cabecera de columnas
      doc.setFontSize(9); doc.setFont('helvetica', 'bold');
      doc.setTextColor(148, 163, 184);
      doc.text('CONCEPTO', ML, y);
      doc.text('FECHA', W - MR - 60, y, { align: 'left' });
      doc.text('IMPORTE', W - MR, y, { align: 'right' });
      y += 4;
      doc.setDrawColor(226, 232, 240);
      doc.line(ML, y, W - MR, y); y += 4;

      // Filas
      doc.setFontSize(10); doc.setFont('helvetica', 'normal');
      doc.setTextColor(30, 41, 59);
      for (const ev of byType[type]) {
        ensure(6);
        const title = (ev.title || TYPE_LABEL[type] || '').substring(0, 60);
        const dateStr = ev.date ? formatDateShort(ev.date) : 'sin fecha';
        const amt = parseFloat(String(ev.price).replace(',', '.'));
        const cur = ev.currency || 'EUR';
        doc.text(title, ML, y);
        doc.setTextColor(100, 116, 139);
        doc.text(dateStr, W - MR - 60, y);
        doc.setTextColor(30, 41, 59);
        doc.text(`${amt.toFixed(2)} ${cur}`, W - MR, y, { align: 'right' });
        y += 5;
      }
      y += 4;
    }

    // Footer con paginado
    const total = doc.getNumberOfPages();
    for (let i = 1; i <= total; i++) {
      doc.setPage(i);
      doc.setFontSize(8); doc.setTextColor(148, 163, 184);
      doc.text(`Resumen de gastos · ${escapeHtmlText(m.name || '')} · ${i} / ${total}`, W - MR, H - 8, { align: 'right' });
    }

    const filename = (slugify(m.name) || 'viaje') + '-gastos.pdf';
    const blob = doc.output('blob');
    // 1) Guardar en la carpeta del viaje
    try { await saveBlobToTripFolder(blob, filename); } catch (_) {}
    // 2) Disparar descarga del navegador para que sea visible al usuario
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(url), 60000);
    showToast('PDF descargado: ' + filename, 'success');
  } catch (e) {
    console.error(e);
    showToast('Error generando el PDF: ' + e.message, 'error');
  }
}

function escapeHtmlText(s) { return String(s || ''); }

/* IMPORTAR VIAJES DESDE JSON */
async function handleImportFile(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  if (!currentUser) { showToast('Debes iniciar sesión primero', 'error'); return; }
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.trips || !Array.isArray(data.trips)) throw new Error('El archivo no tiene el formato esperado (falta "trips")');
    
    const nTrips = data.trips.length;
    const nAtts = (data.attachments || []).length;
    if (!confirm(`¿Importar ${nTrips} viaje(s) y ${nAtts} adjunto(s) a tu cuenta?`)) {
      e.target.value = '';
      return;
    }
    
    showToast('Importando... esto puede tardar un momento');
    const { setDoc, doc, db, serverTimestamp } = window.FB;
    
    // 1) Subir attachments
    let attachDone = 0;
    for (const a of (data.attachments || [])) {
      try {
        await setDoc(doc(db, 'users', currentUser.uid, 'attachments', a.attId), {
          name: a.name,
          mime: a.mime || 'application/octet-stream',
          size: a.size || 0,
          data: a.data,
          _created: serverTimestamp()
        });
        attachDone++;
      } catch (err) {
        console.error('Error subiendo adjunto', a.name, err);
      }
    }
    
    // 2) Subir trips
    let tripDone = 0;
    for (const t of data.trips) {
      try {
        const id = t.meta?.id || ('trip-' + Date.now() + '-' + Math.random().toString(36).slice(2,7));
        await setDoc(doc(db, 'users', currentUser.uid, 'trips', id), {
          meta: { ...t.meta, id },
          events: t.events || [],
          _created: serverTimestamp()
        });
        tripDone++;
      } catch (err) {
        console.error('Error subiendo viaje', t.meta?.name, err);
      }
    }
    
    showToast(`Importado: ${tripDone}/${nTrips} viajes, ${attachDone}/${nAtts} adjuntos`, 'success');
    e.target.value = '';
    
    // Recargar
    await loadTrips();
    renderTripsList();
  } catch (err) {
    console.error(err);
    showToast('Error importando: ' + err.message, 'error');
  }
}

   ACTIVIDADES: CRUD + navegación + render
   ===================================================== */
function activitiesCollection() {
  const { db, collection } = window.FB;
  return collection(db, 'users', currentUser.uid, 'activities');
}
function activityDocRef(id) {
  const { db, doc } = window.FB;
  return doc(db, 'users', currentUser.uid, 'activities', id);
}

async function loadActivities() {
  const { getDocs } = window.FB;
  const snap = await getDocs(activitiesCollection());
  allActivities = [];
  snap.forEach(d => allActivities.push({ id: d.id, ...d.data() }));
  allActivities.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
}

async function createActivity(data) {
  const { setDoc, serverTimestamp } = window.FB;
  const id = 'act-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
  const activity = {
    ...data,
    id,
    createdAt: new Date().toISOString(),
    _created: serverTimestamp()
  };
  await setDoc(activityDocRef(id), activity);
  return { id, ...activity };
}

async function updateActivity(id, data) {
  const { setDoc, serverTimestamp } = window.FB;
  await setDoc(activityDocRef(id), { ...data, _updated: serverTimestamp() });
}

async function deleteActivity(id) {
  if (!confirm('¿Eliminar esta actividad?')) return;
  const { deleteDoc } = window.FB;
  await deleteDoc(activityDocRef(id));
  await loadActivities();
  renderActivitiesList();
  showToast('Actividad eliminada');
}

async function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (tab === 'viajes') {
    currentTrip = null;
    try { await loadTrips(); renderTripsList(); } catch (err) { console.error(err); }
  } else {
    try { await loadActivities(); renderActivitiesList(); } catch (err) {
      console.error(err);
      showToast('Error cargando actividades: ' + err.message, 'error');
    }
  }
}

    return;

  editingActivity.photo = 'data:' + (file.type || 'image/jpeg') + ';base64,' + b64;

const DEFAULT_CHECKLIST = [

  { name: 'Electrónica', items: ['Cargador del móvil', 'Batería externa (powerbank)', 'Auriculares', 'Adaptador de enchufe', 'Palo selfie'] },
  { name: 'Higiene y aseo', items: ['Neceser', 'Cepillo de dientes y pasta', 'Desodorante', 'Champú / gel'] },
  { name: 'Salud', items: ['Medicación habitual', 'Paracetamol / Ibuprofeno'] },
  { name: 'Otros', items: ['Botella de agua reutilizable', 'Bolsa para ropa sucia', 'Mochila pequeña / riñonera', 'Gafas de sol', 'Libro / Kindle'] }
];

function ensureChecklist() {
  if (!currentTrip.data.checklist) {
    currentTrip.data.checklist = DEFAULT_CHECKLIST.map(cat => ({
      name: cat.name,
      items: cat.items.map(t => ({ id: 'c' + Date.now() + Math.random().toString(36).slice(2, 6), text: t, checked: false }))
    }));
  }
}

function checklistProgress() {
  const cl = currentTrip.data.checklist || [];
  let total = 0, done = 0;
  for (const cat of cl) for (const it of cat.items) { total++; if (it.checked) done++; }
  return { total, done, pct: total ? Math.round(done * 100 / total) : 0 };
}

function renderChecklistBody() {
  const cl = currentTrip.data.checklist || [];
  const prog = checklistProgress();
  let html = `
    <div class="checklist-progress">
      <span>${prog.done} / ${prog.total} marcadas</span>
      <div class="bar"><div class="fill" style="width:${prog.pct}%"></div></div>
      <span>${prog.pct}%</span>
    </div>
  `;
  cl.forEach((cat, ci) => {
    html += `
      <div class="check-cat">
        <div class="check-cat-h">
          📦 ${escapeHtml(cat.name)}
          <button class="del-cat" onclick="deleteChecklistCategory(${ci})" title="Eliminar categoría">🗑️</button>
        </div>
        ${cat.items.map((it, ii) => `
          <div class="check-item ${it.checked ? 'done' : ''}">
            <input type="checkbox" id="ck-${ci}-${ii}" ${it.checked ? 'checked' : ''} onchange="toggleChecklistItem(${ci}, ${ii})">
            <label for="ck-${ci}-${ii}">${escapeHtml(it.text)}</label>
            <button class="del-item" onclick="deleteChecklistItem(${ci}, ${ii})" title="Quitar">×</button>
          </div>
        `).join('')}
        <div class="check-add">
          <input type="text" placeholder="Añadir cosa..." id="add-${ci}" onkeydown="if(event.key==='Enter')addChecklistItem(${ci})">
          <button onclick="addChecklistItem(${ci})">+</button>
        </div>
      </div>
    `;
  });
  html += `
    <div class="check-add" style="margin-top:18px">
      <input type="text" placeholder="Nueva categoría..." id="add-cat" onkeydown="if(event.key==='Enter')addChecklistCategory()">
      <button onclick="addChecklistCategory()">+ Categoría</button>
    </div>
  `;
  return html;
}

function openChecklistModal() {
  ensureChecklist();
  const html = `
    <div class="modal-backdrop" >
      <div class="modal">
        <div class="modal-header">
          <h3>📋 Checklist — ${escapeHtml(currentTrip.data.meta.name)}</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="checklist-body">${renderChecklistBody()}</div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
        </div>
      </div>
    </div>
  `;
  openModalHtml(html);
}

function refreshChecklistBody() {
  const body = document.getElementById('checklist-body');
  if (body) body.innerHTML = renderChecklistBody();
}

async function toggleChecklistItem(ci, ii) {
  const item = currentTrip.data.checklist[ci].items[ii];
  item.checked = !item.checked;
  await saveCurrentTrip();
  refreshChecklistBody();
}

async function addChecklistItem(ci) {
  const input = document.getElementById('add-' + ci);
  const text = (input?.value || '').trim();
  if (!text) return;
  currentTrip.data.checklist[ci].items.push({
    id: 'c' + Date.now() + Math.random().toString(36).slice(2, 6),
    text: text, checked: false
  });
  input.value = '';
  await saveCurrentTrip();
  refreshChecklistBody();
}

async function deleteChecklistItem(ci, ii) {
  currentTrip.data.checklist[ci].items.splice(ii, 1);
  await saveCurrentTrip();
  refreshChecklistBody();
}

async function deleteChecklistCategory(ci) {
  const cat = currentTrip.data.checklist[ci];
  if (cat.items.length > 0 && !confirm(`¿Eliminar la categoría "${cat.name}" y sus ${cat.items.length} items?`)) return;
  currentTrip.data.checklist.splice(ci, 1);
  await saveCurrentTrip();
  refreshChecklistBody();
}

async function addChecklistCategory() {
  const input = document.getElementById('add-cat');
  const name = (input?.value || '').trim();
  if (!name) return;
  currentTrip.data.checklist.push({ name, items: [] });
  input.value = '';
  await saveCurrentTrip();
  refreshChecklistBody();
}

function toggleAddMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('add-menu');
  if (!menu) return;
  menu.classList.toggle('open');
  if (menu.classList.contains('open')) {
    setTimeout(() => document.addEventListener('click', closeAddMenuOnOutside), 0);
  }
}
function closeAddMenu() {
  const menu = document.getElementById('add-menu');
  if (menu) menu.classList.remove('open');
  document.removeEventListener('click', closeAddMenuOnOutside);
}
function closeAddMenuOnOutside(e) {
  const menu = document.getElementById('add-menu');
  if (!menu) return;
  if (!menu.parentElement.contains(e.target)) closeAddMenu();
}

/* TOAST */
let toastTimer = null;
function showToast(msg, kind) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' ' + kind : ' success');
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.remove(), 3200);
}

  // Esperar a que Firebase esté listo
  if (!window.FB) {
    await new Promise(r => window.addEventListener('firebase-ready', r, { once: true }));
  }
  const { onAuthStateChanged } = window.FB;
  onAuthStateChanged(window.FB.auth, async (user) => {
    currentUser = user;
    updateFolderInfo();
    const tabsBar = document.getElementById('tabs-bar');
    if (user) {
      if (tabsBar) tabsBar.style.display = '';
      try {
        await loadTrips();
        try { await loadActivities(); } catch(_) { allActivities = []; }
        // Si viene ?url=... por el Shortcut de iOS, abrir directamente el modal de actividad
        const params = new URLSearchParams(location.search);
        const incomingUrl = params.get('url') || params.get('u');
        if (incomingUrl) {
          currentTab = 'actividades';
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'actividades'));
          renderActivitiesList();
          editingActivity = {
            title: '', description: '', province: '',
            audience: 'con-ninos',
            photo: '', link: incomingUrl, address: '', price: '', website: '',
            duration: '', schedule: ''
          };
          renderActivityModal();
          // Limpiar la URL para no reabrir el modal al recargar
          window.history.replaceState({}, '', location.pathname);
        } else {
          currentTab = 'viajes';
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'viajes'));
          renderTripsList();
        }
      } catch (err) {
        console.error('Error cargando datos:', err);
        showToast('Error: ' + err.message, 'error');
      }
    } else {
      if (tabsBar) tabsBar.style.display = 'none';
      currentTrip = null;
      allTrips = [];
      allActivities = [];
      renderWelcome();
    }
  });
}

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
</body>
</html>
