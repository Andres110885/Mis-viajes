<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;background:#f6f8fb;color:#1a2332}
header{background:linear-gradient(135deg,#2563eb,#8b5cf6);color:white;padding:36px 24px;text-align:center;position:relative}
h1{margin:0;font-size:30px}
.sub{opacity:.9;font-size:14px;margin-top:6px}
main{max-width:640px;margin:0 auto;padding:24px 16px}
.actions{display:flex;justify-content:flex-end;margin-bottom:16px;gap:8px}
.new-btn{background:#2563eb;color:white;text-decoration:none;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 6px rgba(37,99,235,.3)}
.new-btn:hover{background:#1d4fd0}
.trip-card{display:block;background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-decoration:none;color:inherit;margin-bottom:12px;border:1px solid #e2e8f0}
.trip-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.1)}
.trip-card h2{margin:0 0 6px;font-size:19px}
.trip-card .dates{color:#64748b;font-size:14px}
.trip-card .arrow{float:right;color:#2563eb;font-size:22px}
.empty{background:white;border-radius:16px;padding:40px 24px;text-align:center;color:#64748b;border:1px dashed #cbd5e1}
.empty .icon{font-size:48px;margin-bottom:10px}
.empty h2{color:#1a2332;font-size:20px;margin:6px 0 8px}
footer{text-align:center;color:#94a3b8;padding:20px;font-size:12px}
</style>
</head>
<body>
<header>
<h1>✈️ Mis Viajes</h1>
<div class="sub">Tus próximos itinerarios</div>
</header>
<main>

<div class="actions">
